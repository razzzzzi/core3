  var id = 'terminal';
  if(WM.get(id)){ WM.focus(id); return; }
  var content = document.createElement('div');
  content.style.cssText = 'display:flex;flex-direction:column;height:100%;background:#0a0a0f;font-family:"Cascadia Code","Consolas",monospace';
  var output = document.createElement('div');
  output.style.cssText = 'flex:1;overflow-y:auto;padding:10px;font-size:12px;line-height:1.6;color:#a8ffa8';
  content.appendChild(output);
  var inputRow = document.createElement('div');
  inputRow.style.cssText = 'display:flex;align-items:center;padding:6px 10px;background:#0f0f17;border-top:1px solid rgba(16,185,129,0.15)';
  var prompt = document.createElement('span');
  prompt.style.cssText = 'color:#10b981;margin-right:6px;font-size:12px';
  prompt.textContent = 'zephyr@os:~$';
  var input = document.createElement('input');
  input.style.cssText = 'flex:1;background:transparent;border:none;outline:none;color:#e5e7eb;font-family:inherit;font-size:12px';
  input.placeholder = 'type a command (try: help)';
  inputRow.appendChild(prompt);
  inputRow.appendChild(input);
  content.appendChild(inputRow);
  WM.create({id:id, title:'Terminal', icon:'▣', width:560, height:380, content:content});

  var history = [];
  var histIdx = -1;
  var pipeBuffer = null;
  var piping = false;
  function print(text, color){
    var line = document.createElement('div');
    line.style.color = color || '#a8ffa8';
    line.style.whiteSpace = 'pre-wrap';
    line.style.wordBreak = 'break-word';
    line.textContent = text;
    output.appendChild(line);
    output.scrollTop = output.scrollHeight;
    if(piping){
      if(!pipeBuffer) pipeBuffer = [];
      pipeBuffer.push(text);
    }
  }
  function printHtml(html){
    var line = document.createElement('div');
    line.innerHTML = html;
    output.appendChild(line);
    output.scrollTop = output.scrollHeight;
  }
  print('Zephyr OS v' + Kernel.c1.version + ' — Terminal');
  print('Type "help" for available commands.\n');

  var commands = {
    help: function(){ print('Available commands:', '#6ee7b7');
      print('');
      print('  ── System ──', '#9ca3af');
      print('  state             Show kernel state (version, sealed, frozen, counts)');
      print('  fps               Show current FPS + frame delta');
      print('  audit             Run 44-point FABLE5 compliance checks');
      print('  dispatch          Show dispatch table (C3.5) status');
      print('');
      print('  ── Partitions ──', '#9ca3af');
      print('  ls, partitions    List all 15 kernel partitions');
      print('  mem, memory       Show memory manager (C3.2) stats');
      print('  apps              List registered apps (C3.12)');
      print('  windows           List open desktop windows');
      print('');
      print('  ── Files ──', '#9ca3af');
      print('  cat <file>        Print VFS file contents (C3.13)');
      print('  errors            Show recent errors (ring buffer)');
      print('  fatals            Show FATAL errors (never evicted — fix #18)');
      print('');
      print('  ── Actions ──', '#9ca3af');
      print('  open <app>        Open a system app (taskmanager, terminal, files, etc.)');
      print('  run <app>         Launch a registered app by name');
      print('  kill <title>      Close windows matching a title');
      print('  suspend           Suspend the kernel (pause loop)');
      print('  resume            Resume the kernel');
      print('  shutdown          Shutdown the kernel (destroy non-core partitions)');
      print('');
      print('  ── Meta ──', '#9ca3af');
      print('  man <cmd>         Show manual for a command');
      print('  history           Show command history');
      print('  clear, cls        Clear terminal');
      print('  echo <text>       Print text');
      print('');
      print('  Tip: Tab completes commands. ↑/↓ navigates history.', '#6b7280');
      print('');
    },
    ls: function(){ return commands.partitions(); },
    partitions: function(){
      var parts = Kernel.listPartitions();
      print('Partitions (' + parts.length + '):', '#6ee7b7');
      parts.forEach(function(pid){
        var d = Kernel.getPartition(pid);
        print('  ' + pid + '  slot=' + d.slot + '  methods=' + d.methodCount + '  exports=' + d.exportCount + (d.exportsLocked ? ' [locked]' : ''));
      });
      print('');
    },
    mem: function(){ return commands.memory(); },
    memory: function(){
      var s = Kernel.memoryStats();
      print('Memory (C3.2):', '#6ee7b7');
      print('  used:       ' + s.used.toLocaleString() + ' bytes');
      print('  available:  ' + s.available.toLocaleString() + ' bytes');
      print('  capacity:   ' + s.capacity.toLocaleString() + ' bytes');
      print('  bump ptr:   ' + s.bumpPointer.toLocaleString());
      print('  freed:      ' + s.freed.toLocaleString());
      print('  blk alloc:  ' + s.allocatedBlocks);
      print('  blk free:   ' + s.freeBlocks);
      print('');
    },
    apps: function(){
      var apps;
      try{ apps = Kernel.syscall.invoke('C3.12', 'listApps'); }catch(e){ apps = []; }
      var userApps = apps.filter(function(n){ return n.indexOf('__') !== 0; });
      print('Registered apps (' + userApps.length + '):', '#6ee7b7');
      userApps.forEach(function(n){ print('  🚀 ' + n); });
      print('');
    },
    windows: function(){
      var wins = WM.list();
      print('Open windows (' + wins.length + '):', '#6ee7b7');
      wins.forEach(function(w){ print('  [' + w.id + '] ' + (w.icon||'') + ' ' + (w.title||'Window') + (w.minimized ? ' (minimized)' : '') + (w.maximized ? ' (maximized)' : '')); });
      print('');
    },
    errors: function(){
      var errs = Kernel.getErrors().reverse();
      print('Recent errors (' + errs.length + '):', '#6ee7b7');
      errs.slice(0, 15).forEach(function(e){ print('  [' + e.severity + '] ' + e.partition + ': ' + e.msg); });
      if(errs.length > 15) print('  ... ' + (errs.length - 15) + ' more');
      print('');
    },
    fatals: function(){
      var f = Kernel.getFatalErrors();
      print('FATAL errors (' + f.length + ', never evicted):', f.length > 0 ? '#fca5a5' : '#6ee7b7');
      f.forEach(function(e){ print('  [' + e.partition + '] ' + e.msg); });
      print('');
    },
    audit: function(){
      print('Running 44-point FABLE5 audit...', '#6ee7b7');
      runAuditChecks(Kernel).then(function(results){
        var passes = results.filter(function(r){ return r.pass; }).length;
        print(passes + '/44 passing', passes === 44 ? '#6ee7b7' : '#fca5a5');
        results.forEach(function(r){ print('  ' + (r.pass ? '✓' : '✗') + ' #' + r.id + ' ' + r.title); });
        print('');
      });
    },
    dispatch: function(){
      print('Dispatch table:', '#6ee7b7');
      print('  frozen: ' + Kernel.dispatch.frozen);
      var names = Object.keys(DISPATCH_SCHEMA);
      names.forEach(function(n){
        var bound;
        try{ Kernel.dispatch.get(n); bound = true; }catch(e){ bound = false; }
        print('  ' + (bound ? '✓' : '✗') + ' ' + n + ' (slot ' + DISPATCH_SCHEMA[n].slot + ')');
      });
      print('');
    },
    state: function(){
      print('Kernel state:', '#6ee7b7');
      print('  state:        ' + Kernel.getState());
      print('  version:      ' + Kernel.c1.version);
      print('  c1.sealed:    ' + Kernel.c1.sealed);
      print('  c2.frozen:    ' + Object.isFrozen(Kernel.c2));
      print('  dispatch.frozen: ' + Kernel.dispatch.frozen);
      print('  errors:       ' + Kernel.getErrorCount());
      print('  fatals:       ' + Kernel.getFatalErrors().length);
      print('  partitions:   ' + Kernel.listPartitions().length);
      print('');
    },
    fps: function(){
      print('FPS: ' + Kernel.dispatch.call('LOOP_FPS').toFixed(1), '#6ee7b7');
      print('Delta: ' + Kernel.dispatch.call('LOOP_DT').toFixed(2) + ' ms');
      print('');
    },
    clear: function(){ output.innerHTML = ''; },
    cls: function(){ return commands.clear(); },
    echo: function(args){ print(args.join(' ')); },
    open: function(args){
      var app = args[0];
      if(app === 'taskmanager' || app === 'tm') Apps.taskManager();
      else if(app === 'notepad') Apps.notepad();
      else if(app === 'about') Apps.about();
      else if(app === 'calculator' || app === 'calc') Apps.calculator();
      else if(app === 'terminal') Apps.terminal();
      else if(app === 'fileexplorer' || app === 'files') Apps.fileExplorer();
      else if(app === 'appstore' || app === 'store') Apps.appStore();
      else if(app === 'settings') Apps.settings();
      else print('Unknown app: ' + app, '#fca5a5');
    },
    shutdown: function(){ print('Shutting down kernel...', '#fca5a5'); Kernel.shutdown(); },
    suspend: function(){ print('Suspending...', '#fcd34d'); Kernel.suspend(); },
    resume: function(){ print('Resuming...', '#6ee7b7'); Kernel.resume(); },
    cat: function(args){
      if(!args[0]){ print('Usage: cat <filename>', '#fca5a5'); return; }
      Kernel.syscall.invoke('C3.13', 'readFile', args[0]).then(function(buf){
        var text = new TextDecoder().decode(new Uint8Array(buf));
        var lines = text.split('\n');
        print('--- '+args[0]+' ('+buf.byteLength+' bytes) ---', '#6ee7b7');
        lines.forEach(function(line){ print(line); });
        print('--- end ---');
        pipeBuffer = lines;
      }).catch(function(e){ print('Error: '+e.message, '#fca5a5'); });
    },
    run: function(args){
      if(!args[0]){ print('Usage: run <appname>', '#fca5a5'); return; }
      var name = args[0];
      var apps;
      try{ apps = Kernel.syscall.invoke('C3.12', 'listApps'); }catch(e){ apps = []; }
      if(apps.indexOf(name) < 0){ print('App not found: '+name+' (registered: '+apps.filter(function(n){return n.indexOf('__')!==0}).join(', ')+')', '#fca5a5'); return; }
      Apps.launchCustom(name);
      print('Launched: '+name, '#6ee7b7');
    },
    kill: function(args){
      if(!args[0]){ print('Usage: kill <window-title>', '#fca5a5'); return; }
      var target = args.join(' ').toLowerCase();
      var wins = WM.list();
      var killed = 0;
      wins.forEach(function(w){ if((w.title||'').toLowerCase().indexOf(target) >= 0){ WM.close(w.id); killed++; } });
      print(killed > 0 ? 'Killed '+killed+' window(s) matching "'+target+'"' : 'No windows matching "'+target+'"', killed > 0 ? '#6ee7b7' : '#fca5a5');
    },
    man: function(args){
      if(!args[0]){ print('Usage: man <command>', '#fca5a5'); return; }
      var manuals = {
        help: 'help — Show available commands grouped by category.',
        ls: 'ls [partitions] — List all 15 kernel partitions with slot/method/export counts.',
        mem: 'mem [memory] — Show memory manager (C3.2) stats: used, available, capacity, bump pointer, freed, blocks.',
        apps: 'apps — List all apps registered with the Workspace (C3.12). Internal __-prefixed apps are hidden.',
        windows: 'windows — List all open desktop windows with their state (minimized/maximized).',
        errors: 'errors — Show the 15 most recent errors from the ring buffer (C3.18 two-tier log).',
        fatals: 'fatals — Show FATAL errors (never evicted from the unbounded FATAL log — fix #18).',
        audit: 'audit — Run all 20 FABLE5 compliance checks against the live kernel.',
        cat: 'cat <filename> — Print the contents of a VFS file (C3.13).',
        run: 'run <appname> — Launch a registered app by name.',
        kill: 'kill <title> — Close windows whose title contains the given string.',
        state: 'state — Show kernel state (version, sealed, frozen, error/partition counts).',
        fps: 'fps — Show current FPS and frame delta time from the rAF loop (C3.8).'
      };
      var m = manuals[args[0]];
      print(m || 'No manual entry for: '+args[0], m ? '#6ee7b7' : '#fca5a5');
    },
    history: function(){
      print('Command history ('+history.length+' entries):', '#6ee7b7');
      history.slice(-20).forEach(function(cmd, i){ print('  '+(history.length-20+i+1)+': '+cmd); });
    },
    grep: function(args){
      if(!args[0]){ print('Usage: grep <pattern> [or pipe: cmd | grep <pattern>]', '#fca5a5'); return; }
      var pattern = args[0];
      var input = pipeBuffer;
      if(input){
        pipeBuffer = null;
        var matched = input.filter(function(line){ return line.indexOf(pattern) >= 0; });
        if(matched.length === 0) print('No matches for "'+pattern+'"', '#9ca3af');
        else matched.forEach(function(line){ print(line, '#6ee7b7'); });
      } else {
        print('grep requires piped input (e.g. cat file | grep pattern)', '#fca5a5');
      }
    },
    wc: function(args){
      var input = pipeBuffer;
      if(input){
        pipeBuffer = null;
        var words = input.reduce(function(n,line){ return n + line.trim().split(/\s+/).filter(Boolean).length; }, 0);
        var chars = input.reduce(function(n,line){ return n + line.length; }, 0);
        print('  '+input.length+' lines', '#6ee7b7');
        print('  '+words+' words', '#6ee7b7');
        print('  '+chars+' characters', '#6ee7b7');
      } else {
        print('wc requires piped input (e.g. cat file | wc)', '#fca5a5');
      }
    },
    sort: function(){
      var input = pipeBuffer;
      if(input){
        pipeBuffer = null;
        var sorted = input.slice().sort();
        sorted.forEach(function(line){ print(line); });
      } else {
        print('sort requires piped input', '#fca5a5');
      }
    },
    head: function(args){
      var n = args[0] ? parseInt(args[0], 10) : 10;
      var input = pipeBuffer;
      if(input){
        pipeBuffer = null;
        input.slice(0, n).forEach(function(line){ print(line); });
      } else {
        print('head requires piped input (e.g. cat file | head 5)', '#fca5a5');
      }
    },
    tail: function(args){
      var n = args[0] ? parseInt(args[0], 10) : 10;
      var input = pipeBuffer;
      if(input){
        pipeBuffer = null;
        input.slice(-n).forEach(function(line){ print(line); });
      } else {
        print('tail requires piped input (e.g. cat file | tail 5)', '#fca5a5');
      }
    },
    find: function(args){
      if(!args[0]){ print('Usage: find <pattern>', '#fca5a5'); return; }
      var pattern = args[0];
      var files;
      try{ files = Kernel.syscall.invoke('C3.13', 'listFiles'); }catch(e){ files = []; }
      var matched = files.filter(function(f){ return f.name.indexOf(pattern) >= 0; });
      if(matched.length === 0) print('No files matching "'+pattern+'"', '#9ca3af');
      else {
        pipeBuffer = null;
        matched.forEach(function(f){
          var sz = f.size < 1024 ? f.size + ' B' : (f.size/1024).toFixed(1) + ' KB';
          print(f.name + ' (' + sz + ')');
        });
      }
    },
    write: function(args){
      if(!args[0]){ print('Usage: cmd | write <filename>', '#fca5a5'); return; }
      var filename = args[0];
      var input = pipeBuffer;
      if(input){
        var data = new TextEncoder().encode(input.join('\n'));
        Kernel.syscall.invoke('C3.13', 'writeFile', filename, data).then(function(r){
          print('Wrote '+r.bytes+' bytes to '+filename+' (persisted: '+r.persisted+')', '#6ee7b7');
        }).catch(function(e){ print('Write failed: '+e.message, '#fca5a5'); });
      } else {
        print('write requires piped input (e.g. ls | write files.txt)', '#fca5a5');
      }
    }
  };

  function execute(cmd){
    piping = false;
    print('zephyr@os:~$ ' + cmd, '#9ca3af');
    var redirectFile = null;
    var redirectMatch = cmd.match(/^(.*?)\s*>\s*(\S+)\s*$/);
    if(redirectMatch && redirectMatch[1].indexOf('>') < 0){
      cmd = redirectMatch[1];
      redirectFile = redirectMatch[2];
    }
    var pipeStages = cmd.split('|').map(function(s){ return s.trim(); }).filter(Boolean);
    if(pipeStages.length === 0) return;
    var hasPipe = pipeStages.length > 1 || !!redirectFile;
    pipeBuffer = null;
    var chain = Promise.resolve();
    pipeStages.forEach(function(stage, stageIdx){
      chain = chain.then(function(){
        piping = hasPipe;
        var parts = stage.split(/\s+/);
        var cmdName = parts[0].toLowerCase();
        var args = parts.slice(1);
        if(!cmdName) return;
        if(commands[cmdName]){
          try{
            var r = commands[cmdName](args);
            return r && r.then ? r : Promise.resolve(r);
          }
          catch(e){ print('Error: ' + e.message, '#fca5a5'); }
        } else {
          print('Command not found: ' + cmdName + ' (type "help")', '#fca5a5');
        }
      });
    });
    chain.then(function(){
      piping = false;
      if(redirectFile && pipeBuffer){
        var data = new TextEncoder().encode(pipeBuffer.join('\n'));
        Kernel.syscall.invoke('C3.13', 'writeFile', redirectFile, data).then(function(r){
          print('Wrote '+r.bytes+' bytes to '+redirectFile+' (persisted: '+r.persisted+')', '#6ee7b7');
          pipeBuffer = null;
          print('');
        }).catch(function(e){ print('Redirect failed: '+e.message, '#fca5a5'); pipeBuffer = null; print(''); });
      } else {
        pipeBuffer = null;
        print('');
      }
    });
  }

  input.addEventListener('keydown', function(e){
    if(e.key === 'Enter'){
      var cmd = input.value;
      if(cmd.trim()){ history.push(cmd); histIdx = history.length; }
      input.value = '';
      execute(cmd);
    } else if(e.key === 'ArrowUp'){
      e.preventDefault();
      if(histIdx > 0){ histIdx--; input.value = history[histIdx] || ''; }
    } else if(e.key === 'ArrowDown'){
      e.preventDefault();
      if(histIdx < history.length - 1){ histIdx++; input.value = history[histIdx] || ''; }
      else { histIdx = history.length; input.value = ''; }
    } else if(e.key === 'Tab'){
      e.preventDefault();
      var partial = input.value.toLowerCase();
      var matches = Object.keys(commands).filter(function(c){ return c.indexOf(partial) === 0; });
      if(matches.length === 1) input.value = matches[0] + ' ';
      else if(matches.length > 1) print(matches.join('  '), '#9ca3af');
    }
  });
  setTimeout(function(){ input.focus(); }, 100);
};


Apps.calculator = function(){
  var id = 'calculator';
  if(WM.get(id)){ WM.focus(id); return; }
  var content = document.createElement('div');
  content.style.cssText = 'display:flex;flex-direction:column;height:100%;background:#13131b;padding:12px;gap:8px';
  var display = document.createElement('div');
  display.style.cssText = 'background:#0a0a0f;border:1px solid rgba(255,255,255,0.06);border-radius:6px;padding:14px 16px;text-align:right;font-family:"Cascadia Code",monospace;font-size:28px;color:#e5e7eb;min-height:56px;word-break:break-all';
  display.textContent = '0';
  content.appendChild(display);
  var subDisplay = document.createElement('div');
  subDisplay.style.cssText = 'text-align:right;font-size:10px;color:#6b7280;font-family:monospace;min-height:14px';
  content.appendChild(subDisplay);
  var grid = document.createElement('div');
  grid.style.cssText = 'display:grid;grid-template-columns:repeat(4,1fr);gap:6px;flex:1';
  content.appendChild(grid);
  WM.create({id:id, title:'Calculator', icon:'🧮', width:280, height:380, content:content});

  var current = '0', stored = null, op = null, justEvaluated = false;
  function updateDisplay(){
    var val = current;
    if(val.length > 12 && val.indexOf('.') < 0) val = parseFloat(val).toExponential(6);
    display.textContent = val;
    subDisplay.textContent = (stored !== null ? stored + ' ' + (op||'') : '') + (justEvaluated ? ' =' : '');
  }
  function compute(a, b, operator){
    a = parseFloat(a); b = parseFloat(b);
    if(operator === '+') return a + b;
    if(operator === '-') return a - b;
    if(operator === '×') return a * b;
    if(operator === '÷') return b === 0 ? 'Error' : a / b;
    return b;
  }
  function press(key){
    if(key >= '0' && key <= '9'){
      if(current === '0' || justEvaluated){ current = key; justEvaluated = false; }
      else current += key;
    } else if(key === '.'){
      if(justEvaluated){ current = '0.'; justEvaluated = false; }
      else if(current.indexOf('.') < 0) current += '.';
    } else if(key === 'C'){
      current = '0'; stored = null; op = null; justEvaluated = false;
    } else if(key === '⌫'){
      if(current.length > 1) current = current.slice(0, -1);
      else current = '0';
    } else if(key === '±'){
      current = current.startsWith('-') ? current.slice(1) : '-' + current;
    } else if(key === '%'){
      current = String(parseFloat(current) / 100);
    } else if(key === '+' || key === '-' || key === '×' || key === '÷'){
      if(stored !== null && op && !justEvaluated){
        var result = compute(stored, current, op);
        current = String(result);
      }
      stored = current; op = key; justEvaluated = true;
    } else if(key === '='){
      if(stored !== null && op){
        var result = compute(stored, current, op);
        current = String(result);
        stored = null; op = null; justEvaluated = true;
      }
    }
    updateDisplay();
  }
  var keys = ['C','⌫','%','÷','7','8','9','×','4','5','6','-','1','2','3','+','±','0','.','='];
  keys.forEach(function(k){
    var btn = document.createElement('button');
    var isOp = (k === '+' || k === '-' || k === '×' || k === '÷');
    var isEq = (k === '=');
    var isFn = (k === 'C' || k === '⌫' || k === '%' || k === '±');
    btn.textContent = k;
    btn.style.cssText = 'border:none;border-radius:6px;font-size:16px;font-weight:500;cursor:pointer;transition:background .1s;'+
      (isEq ? 'background:#10b981;color:#fff;font-weight:700;' : isOp ? 'background:#1e3a5a;color:#6ee7b7;' : isFn ? 'background:#252530;color:#9ca3af;' : 'background:#1e1e28;color:#e5e7eb;');
    btn.addEventListener('mouseenter', function(){ btn.style.filter = 'brightness(1.15)'; });
    btn.addEventListener('mouseleave', function(){ btn.style.filter = ''; });
    btn.addEventListener('click', function(){ press(k); });
    grid.appendChild(btn);
  });
  updateDisplay();
  content.tabIndex = 0;
  content.addEventListener('keydown', function(e){
    var k = e.key;
    if(k >= '0' && k <= '9') press(k);
    else if(k === '.') press('.');
    else if(k === '+') press('+');
    else if(k === '-') press('-');
    else if(k === '*') press('×');
    else if(k === '/') { e.preventDefault(); press('÷'); }
    else if(k === 'Enter' || k === '=') { e.preventDefault(); press('='); }
    else if(k === 'Backspace') press('⌫');
    else if(k === 'Escape') press('C');
    else if(k === '%') press('%');
  });
  setTimeout(function(){ content.focus(); }, 100);
};


Apps.fileExplorer = function(){
  var id = 'fileexplorer';
  if(WM.get(id)){ WM.focus(id); return; }
  var content = document.createElement('div');
  content.style.cssText = 'display:flex;flex-direction:column;height:100%;background:#13131b';
  var toolbar = document.createElement('div');
  toolbar.style.cssText = 'display:flex;gap:6px;padding:8px 10px;background:#181820;border-bottom:1px solid rgba(255,255,255,0.06);align-items:center';
  toolbar.innerHTML =
    '<button class="btn sec" id="fe-refresh" style="font-size:11px;padding:5px 10px">🔄 Refresh</button>'+
    '<button class="btn sec" id="fe-new" style="font-size:11px;padding:5px 10px">📄 New file</button>'+
    '<button class="btn sec" id="fe-newfolder" style="font-size:11px;padding:5px 10px">📁 New folder</button>'+
    '<button class="btn sec" id="fe-rename" style="font-size:11px;padding:5px 10px">✏️ Rename</button>'+
    '<button class="btn danger" id="fe-delete" style="font-size:11px;padding:5px 10px">🗑 Delete</button>'+
    '<span style="flex:1"></span>'+
    '<span class="muted" style="font-size:10px" id="fe-status">VFS (C3.13)</span>';
  content.appendChild(toolbar);
  var breadcrumb = document.createElement('div');
  breadcrumb.id = 'fe-breadcrumb';
  breadcrumb.style.cssText = 'padding:6px 10px;background:#15151d;border-bottom:1px solid rgba(255,255,255,0.06);font-size:11px;color:#9ca3af;display:flex;align-items:center;gap:4px;flex-wrap:wrap';
  content.appendChild(breadcrumb);
  var body = document.createElement('div');
  body.style.cssText = 'flex:1;display:flex;overflow:hidden';
  var sidebar = document.createElement('div');
  sidebar.style.cssText = 'width:180px;background:#0f0f17;border-right:1px solid rgba(255,255,255,0.06);padding:8px;overflow-y:auto';
  sidebar.innerHTML = '<div style="font-size:10px;color:#6b7280;text-transform:uppercase;letter-spacing:.4px;margin-bottom:8px;padding:0 4px">Locations</div>'+
    '<div class="fe-loc" data-loc="all" style="padding:6px 8px;border-radius:4px;cursor:pointer;font-size:12px;color:#d1d5db;display:flex;align-items:center;gap:6px"><span>📁</span> All Files</div>'+
    '<div class="fe-loc" data-loc="text" style="padding:6px 8px;border-radius:4px;cursor:pointer;font-size:12px;color:#d1d5db;display:flex;align-items:center;gap:6px"><span>📝</span> Text Files</div>'+
    '<div class="fe-loc" data-loc="bin" style="padding:6px 8px;border-radius:4px;cursor:pointer;font-size:12px;color:#d1d5db;display:flex;align-items:center;gap:6px"><span>🔢</span> Binary Files</div>'+
    '<div style="border-top:1px solid rgba(255,255,255,0.06);margin:8px 0"></div>'+
    '<div style="font-size:10px;color:#6b7280;text-transform:uppercase;letter-spacing:.4px;margin-bottom:8px;padding:0 4px">Storage</div>'+
    '<div id="fe-storage" style="font-size:10px;color:#9ca3af;padding:0 4px;line-height:1.6"></div>'+
    '<div style="margin-top:10px;font-size:9px;color:#4b5563;padding:0 4px">OPFS: <span id="fe-opfs">checking...</span></div>';
  body.appendChild(sidebar);
  var main = document.createElement('div');
  main.style.cssText = 'flex:1;display:flex;flex-direction:column;overflow:hidden';
  var fileList = document.createElement('div');
  fileList.className = 'zephyr-scroll';
  fileList.style.cssText = 'flex:1;overflow-y:auto;padding:8px';
  main.appendChild(fileList);
  var preview = document.createElement('div');
  preview.style.cssText = 'height:140px;border-top:1px solid rgba(255,255,255,0.06);background:#0a0a0f;padding:10px;overflow:auto;font-family:monospace;font-size:11px;color:#9ca3af';
  preview.innerHTML = '<span class="muted">Select a file to preview...</span>';
  main.appendChild(preview);
  body.appendChild(main);
  content.appendChild(body);
  WM.create({id:id, title:'File Explorer', icon:'📁', width:620, height:440, content:content});

  var selectedFile = null;
  var filter = 'all';
  var currentFolder = '';

  function formatBytes(b){
    if(b < 1024) return b + ' B';
    if(b < 1048576) return (b/1024).toFixed(1) + ' KB';
    return (b/1048576).toFixed(1) + ' MB';
  }

  function refresh(){
    var files;
    try{ files = Kernel.syscall.invoke('C3.13', 'listFiles'); }catch(e){ files = []; }
    var opfsAvailable;
    try{ opfsAvailable = Kernel.syscall.invoke('C3.13', 'isAvailable'); }catch(e){ opfsAvailable = false; }
    document.getElementById('fe-opfs').textContent = opfsAvailable ? 'available' : 'unavailable (mock)';
    document.getElementById('fe-opfs').style.color = opfsAvailable ? '#6ee7b7' : '#fcd34d';
    var totalBytes = files.reduce(function(s,f){ return s + f.size; }, 0);
    document.getElementById('fe-storage').textContent = files.length + ' files · ' + formatBytes(totalBytes);
    var bc = document.getElementById('fe-breadcrumb');
    bc.innerHTML = '';
    var rootLink = document.createElement('span');
    rootLink.textContent = '🏠 Root';
    rootLink.style.cssText = 'cursor:pointer;color:#6ee7b7;padding:2px 6px;border-radius:3px';
    rootLink.addEventListener('mouseenter', function(){ rootLink.style.background = 'rgba(16,185,129,0.1)'; });
    rootLink.addEventListener('mouseleave', function(){ rootLink.style.background = ''; });
    rootLink.addEventListener('click', function(){ currentFolder = ''; selectedFile = null; refresh(); });
    bc.appendChild(rootLink);
    if(currentFolder){
      bc.appendChild(document.createTextNode(' › '));
      var folderSpan = document.createElement('span');
      folderSpan.textContent = '📁 ' + currentFolder;
      folderSpan.style.color = '#e5e7eb';
      bc.appendChild(folderSpan);
    }
    var prefix = currentFolder ? currentFolder + '/' : '';
    var subfolders = {};
    var folderFiles = [];
    files.forEach(function(f){
      var name = f.name;
      if(currentFolder){
        if(name.indexOf(prefix) !== 0) return;
        var rest = name.slice(prefix.length);
        var slashIdx = rest.indexOf('/');
        if(slashIdx >= 0){
          var sub = rest.slice(0, slashIdx);
          if(!subfolders[sub]) subfolders[sub] = 0;
          subfolders[sub]++;
        } else {
          folderFiles.push(f);
        }
      } else {
        var slashIdx2 = name.indexOf('/');
        if(slashIdx2 >= 0){
          var sub2 = name.slice(0, slashIdx2);
          if(!subfolders[sub2]) subfolders[sub2] = 0;
          subfolders[sub2]++;
        } else {
          folderFiles.push(f);
        }
      }
    });
    var filteredFiles = folderFiles.filter(function(f){
      var baseName = f.name.split('/').pop();
      if(baseName === '.folder') return false;
      if(filter === 'all') return true;
      if(filter === 'text') return f.name.endsWith('.txt') || f.name.endsWith('.md');
      if(filter === 'bin') return !f.name.endsWith('.txt') && !f.name.endsWith('.md');
      return true;
    });
    var folderNames = Object.keys(subfolders).sort();
    document.getElementById('fe-status').textContent = folderNames.length + ' folders · ' + filteredFiles.length + ' files';
    if(folderNames.length === 0 && filteredFiles.length === 0){
      fileList.innerHTML = '<div style="text-align:center;padding:40px;color:#6b7280;font-size:12px"><div style="font-size:36px;margin-bottom:8px;opacity:0.5">📁</div>'+(currentFolder?'Empty folder':'No files')+'<br><span style="font-size:10px">Click "New file" or "New folder" to create one.</span></div>';
      return;
    }
    fileList.innerHTML = '<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:6px">';
    folderNames.forEach(function(fname){
      var item = document.createElement('div');
      item.style.cssText = 'display:flex;flex-direction:column;align-items:center;gap:4px;padding:12px 6px;border-radius:6px;cursor:pointer;transition:background .1s';
      item.innerHTML = '<div style="font-size:28px">📁</div><div style="font-size:10px;color:#e5e7eb;max-width:110px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+C2.string.escapeHtml(fname)+'</div><div style="font-size:9px;color:#6b7280">'+subfolders[fname]+' items</div>';
      item.addEventListener('mouseenter', function(){ item.style.background = 'rgba(255,255,255,0.04)'; });
      item.addEventListener('mouseleave', function(){ item.style.background = ''; });
      item.addEventListener('click', function(){ currentFolder = currentFolder ? currentFolder + '/' + fname : fname; selectedFile = null; refresh(); });
      fileList.appendChild(item);
    });
    filteredFiles.forEach(function(f){
      var isText = f.name.endsWith('.txt') || f.name.endsWith('.md');
      var displayName = currentFolder ? f.name.slice(prefix.length) : f.name;
      var item = document.createElement('div');
      item.style.cssText = 'display:flex;flex-direction:column;align-items:center;gap:4px;padding:12px 6px;border-radius:6px;cursor:pointer;transition:background .1s;border:1px solid '+(selectedFile===f.name?'rgba(16,185,129,0.4)':'transparent');
      item.innerHTML = '<div style="font-size:28px">'+(isText?'📄':'🔢')+'</div><div style="font-size:10px;color:#e5e7eb;max-width:110px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+C2.string.escapeHtml(displayName)+'</div><div style="font-size:9px;color:#6b7280">'+formatBytes(f.size)+'</div>';
      item.addEventListener('mouseenter', function(){ if(selectedFile!==f.name) item.style.background = 'rgba(255,255,255,0.04)'; });
      item.addEventListener('mouseleave', function(){ if(selectedFile!==f.name) item.style.background = ''; });
      item.addEventListener('click', function(){
        selectedFile = f.name;
        refresh();
        Kernel.syscall.invoke('C3.13', 'readFile', f.name).then(function(buf){
          var bytes = new Uint8Array(buf);
          if(isText){
            preview.innerHTML = '<div style="color:#6ee7b7;margin-bottom:4px">📄 '+C2.string.escapeHtml(f.name)+' ('+bytes.length+' bytes)</div>';
            preview.appendChild(document.createTextNode(new TextDecoder().decode(bytes).substring(0, 500)));
          } else {
            var hex = Array.from(bytes.slice(0, 48)).map(function(b){ return b.toString(16).padStart(2,'0'); }).join(' ');
            preview.innerHTML = '<div style="color:#6ee7b7;margin-bottom:4px">🔢 '+C2.string.escapeHtml(f.name)+' ('+bytes.length+' bytes) — hex preview:</div><div style="color:#fcd34d;word-break:break-all">'+hex+(bytes.length > 48 ? ' ...' : '')+'</div>';
          }
        }).catch(function(e){ preview.innerHTML = '<span class="red">Error: '+C2.string.escapeHtml(e.message)+'</span>'; });
      });
      fileList.appendChild(item);
    });
    fileList.appendChild(document.createElement('div'));
  }

  document.getElementById('fe-refresh').onclick = refresh;
  document.getElementById('fe-new').onclick = function(){
    var name = prompt('File name:', 'newfile.txt');
    if(!name) return;
    var fullPath = currentFolder ? currentFolder + '/' + name : name;
    var data = name.endsWith('.txt') || name.endsWith('.md') ? new TextEncoder().encode('# '+name+'\n\nCreated via File Explorer.') : new Uint8Array(64);
    Kernel.syscall.invoke('C3.13', 'writeFile', fullPath, data).then(function(r){
      refresh();
      preview.innerHTML = '<span class="green">✓ Created '+C2.string.escapeHtml(fullPath)+' ('+r.bytes+' bytes, persisted: '+r.persisted+')</span>';
    }).catch(function(e){ preview.innerHTML = '<span class="red">Error: '+C2.string.escapeHtml(e.message)+'</span>'; });
  };
  document.getElementById('fe-newfolder').onclick = function(){
    var name = prompt('Folder name:', 'newfolder');
    if(!name) return;
    var placeholderPath = (currentFolder ? currentFolder + '/' + name : name) + '/.folder';
    Kernel.syscall.invoke('C3.13', 'writeFile', placeholderPath, new TextEncoder().encode('folder placeholder')).then(function(){
      refresh();
      preview.innerHTML = '<span class="green">✓ Created folder: '+(currentFolder ? C2.string.escapeHtml(currentFolder) + '/' + C2.string.escapeHtml(name) : C2.string.escapeHtml(name))+'</span>';
    }).catch(function(e){ preview.innerHTML = '<span class="red">Error: '+C2.string.escapeHtml(e.message)+'</span>'; });
  };
  document.getElementById('fe-delete').onclick = function(){
    if(!selectedFile){ preview.innerHTML = '<span class="amber">Select a file first.</span>'; return; }
    Kernel.syscall.invoke('C3.13', 'deleteFile', selectedFile);
    preview.innerHTML = '<span class="green">✓ Deleted '+C2.string.escapeHtml(selectedFile)+'</span>';
    selectedFile = null;
    refresh();
  };
  document.getElementById('fe-rename').onclick = function(){
    if(!selectedFile){ preview.innerHTML = '<span class="amber">Select a file first.</span>'; return; }
    var newName = prompt('Rename file to:', selectedFile);
    if(!newName || newName === selectedFile) return;
    Kernel.syscall.invoke('C3.13', 'readFile', selectedFile).then(function(buf){
      return Kernel.syscall.invoke('C3.13', 'writeFile', newName, new Uint8Array(buf));
    }).then(function(){
      Kernel.syscall.invoke('C3.13', 'deleteFile', selectedFile);
      selectedFile = newName;
      preview.innerHTML = '<span class="green">✓ Renamed to '+C2.string.escapeHtml(newName)+'</span>';
      refresh();
    }).catch(function(e){ preview.innerHTML = '<span class="red">Rename failed: '+e.message+'</span>'; });
  };
  sidebar.querySelectorAll('.fe-loc').forEach(function(el){
    el.addEventListener('click', function(){
      sidebar.querySelectorAll('.fe-loc').forEach(function(x){ x.style.background = ''; x.style.color = '#d1d5db'; });
      el.style.background = 'rgba(16,185,129,0.12)';
      el.style.color = '#6ee7b7';
      filter = el.getAttribute('data-loc');
      refresh();
    });
  });
  sidebar.querySelector('.fe-loc').click();
  refresh();
};

    '</div>'+

      _persistSettings();

  function _persistSettings(){ try{ Kernel.saveSettings({accent: currentAccent, wallpaper: currentWp, particles: parseInt(pcSlider.value), animations: !document.body.classList.contains('no-anim')}); }catch(e){} }
  function applyAccent(a){
    var style = document.getElementById('accent-style') || (function(){ var s=document.createElement('style'); s.id='accent-style'; document.head.appendChild(s); return s; })();
    style.textContent =
      '.btn{background:'+a.glow+'0.14);border-color:'+a.glow+'0.3);color:'+a.light+'}'+

      if(input.checked){ slider.style.background = '#10b981'; knob.style.left = '20px'; }

  info.innerHTML = 'Zephyr OS v'+Kernel.c1.version+'<br>'+
    'State: '+Kernel.getState()+'<br>'+
    'Partitions: '+Kernel.listPartitions().length+'<br>'+
    'Errors: '+Kernel.getErrorCount()+' ('+Kernel.getFatalErrors().length+' fatal)<br>'+
    'Memory: '+s.used.toLocaleString()+' / '+s.capacity.toLocaleString()+' bytes<br>'+
    'C1 sealed: '+Kernel.c1.sealed+' · C2 frozen: '+Object.isFrozen(Kernel.c2)+' · Dispatch frozen: '+Kernel.dispatch.frozen;
};


Apps.zephyrProtocol = function(){
  var id = 'zephyr-protocol';
  if(WM.get(id)){ WM.focus(id); return; }

  // =================================================================
  // CIRCLE 3: ZEPHYR PROTOCOL STATE (Struct of Arrays, no JS objects)
  // =================================================================
  var state = {
    zeph_price: 0,
    zsd_price: 0,
    zrs_price: 0,
    zys_price: 0,
    reserve_ratio: 0,
    reserve_ratio_ma: 0,
    zeph_circ: 0,
    zsd_circ: 0,
    zrs_circ: 0,
    zys_circ: 0,
    zeph_in_reserve: 0,
    zys_current_variable_apy: 0,
    last_fetch_time: 0,
    fetch_count: 0,
    error_count: 0,
    raw_bytes_len: 0,
    scrubbed: true
  };

  var POLL_TTL_MS = 30000; // #5: 30s cache TTL enforcement
  var INGRESS_BUF_SIZE = 65536; // 64KB ingress buffer
  var ingressBuf = new Uint8Array(INGRESS_BUF_SIZE); // #7: pre-allocated ingress buffer
  var scrubbedBuf = new Uint8Array(INGRESS_BUF_SIZE); // for scrubbing

  // =================================================================
  // NATIVE JSON FIELD EXTRACTION (#1, #10)
  // No JSON.parse. Scans raw UTF-8 bytes for "key": value patterns.
  // =================================================================
  function extractF64(buf, len, key){
    var keyBytes = [];
    for(var i=0; i<key.length; i++) keyBytes.push(key.charCodeAt(i));
    var keyLen = keyBytes.length;

    for(var i=0; i <= len - keyLen; i++){
      var match = true;
      for(var j=0; j<keyLen; j++){
        if(buf[i+j] !== keyBytes[j]){ match = false; break; }
      }
      if(match){
        // Found key — skip to the value after ":"
        var vStart = i + keyLen;
        while(vStart < len && (buf[vStart] === 0x20 || buf[vStart] === 0x22 || buf[vStart] === 0x3a)) vStart++;
        // Parse number
        var vEnd = vStart;
        while(vEnd < len && buf[vEnd] !== 0x2c && buf[vEnd] !== 0x7d && buf[vEnd] !== 0x20) vEnd++;
        if(vEnd > vStart){
          var str = '';
          for(var k=vStart; k<vEnd; k++) str += String.fromCharCode(buf[k]);
          var val = parseFloat(str);
          if(isFinite(val)) return val;
        }
      }
    }
    return null;
  }

  // =================================================================
  // SCRUB INGRESS BUFFER (#13)
  // Zero out the raw API response immediately after parsing.
  // =================================================================
  function scrubIngress(){
    ingressBuf.set(scrubbedBuf);
    state.scrubbed = true;
  }

  // =================================================================
  // DUMB-PIPE FETCH (#1, #6, #7)
  // JS acts as a dumb pipe: fetch raw bytes, write to ingress buffer,
  // return byte length. No JSON.parse, no JS object creation.
  // =================================================================
  function fetchLivestats(){
    // #5: TTL enforcement — reject if under 30s
    var now = Date.now();
    if(now - state.last_fetch_time < POLL_TTL_MS){
      return Promise.resolve({ status: 'cached', age: now - state.last_fetch_time });
    }

    var apiUrl = 'https://zephyrprotocol.com/api/v1/livestats';

    // Try direct fetch first, fall back to CORS proxy
    return fetch(apiUrl, { mode: 'cors' })
      .then(function(resp){ return resp.arrayBuffer(); })
      .catch(function(e){
        // CORS blocked — use a public CORS proxy as fallback
        return fetch('https://corsproxy.io/?' + encodeURIComponent(apiUrl))
          .then(function(resp){ return resp.arrayBuffer(); });
      })
      .then(function(arrayBuf){
        // #7: Write raw bytes directly into pre-allocated ingress buffer
        var bytes = new Uint8Array(arrayBuf);
        state.raw_bytes_len = Math.min(bytes.length, INGRESS_BUF_SIZE);
        ingressBuf.set(bytes.subarray(0, state.raw_bytes_len));
        state.scrubbed = false;
        state.last_fetch_time = Date.now();
        state.fetch_count++;

        // #1: Native parse — extract fields from raw UTF-8 bytes
        var len = state.raw_bytes_len;
        var p;

        p = extractF64(ingressBuf, len, '"zeph_price"');
        if(p !== null) state.zeph_price = p;

        p = extractF64(ingressBuf, len, '"zsd_price"');
        if(p !== null) state.zsd_price = p;

        p = extractF64(ingressBuf, len, '"zrs_price"');
        if(p !== null) state.zrs_price = p;

        p = extractF64(ingressBuf, len, '"zys_price"');
        if(p !== null) state.zys_price = p;

        p = extractF64(ingressBuf, len, '"reserve_ratio"');
        if(p !== null) state.reserve_ratio = p;

        p = extractF64(ingressBuf, len, '"reserve_ratio_ma"');
        if(p !== null) state.reserve_ratio_ma = p;

        p = extractF64(ingressBuf, len, '"zeph_circ"');
        if(p !== null) state.zeph_circ = p;

        p = extractF64(ingressBuf, len, '"zsd_circ"');
        if(p !== null) state.zsd_circ = p;

        p = extractF64(ingressBuf, len, '"zrs_circ"');
        if(p !== null) state.zrs_circ = p;

        p = extractF64(ingressBuf, len, '"zys_circ"');
        if(p !== null) state.zys_circ = p;

        p = extractF64(ingressBuf, len, '"zeph_in_reserve"');
        if(p !== null) state.zeph_in_reserve = p;

        p = extractF64(ingressBuf, len, '"zys_current_variable_apy"');
        if(p !== null) state.zys_current_variable_apy = p;

        // #13: Scrub ingress buffer immediately after parsing
        scrubIngress();

        return { status: 'fetched', bytes: len };
      })
      .catch(function(e){
        state.error_count++;
        return { status: 'error', message: e.message };
      });
  }

  // =================================================================
  // DASHBOARD UI
  // =================================================================
  var content = document.createElement('div');
  content.style.cssText = 'display:flex;flex-direction:column;height:100%;background:#0a0a12;overflow:hidden;font-family:monospace';
  content.innerHTML =
    '<div style="padding:10px 14px;background:#0f0f17;border-bottom:1px solid rgba(16,185,129,0.2);display:flex;justify-content:space-between;align-items:center">'+
      '<span style="font-size:13px;color:#6ee7b7;font-weight:600">Zephyr Protocol — Live Stats</span>'+
      '<span id="zp-status" style="font-size:10px;color:#9ca3af">idle</span>'+
    '</div>'+
    '<div id="zp-dashboard" style="flex:1;overflow-y:auto;padding:14px;font-size:12px;color:#e5e7eb"></div>'+
    '<div style="padding:8px 14px;background:#0f0f17;border-top:1px solid rgba(255,255,255,0.05);display:flex;gap:8px">'+
      '<button class="btn pass" id="zp-refresh" style="font-size:11px;padding:6px 14px;flex:1">↻ Refresh</button>'+
      '<button class="btn sec" id="zp-auto" style="font-size:11px;padding:6px 14px">Auto: OFF</button>'+
    '</div>';

  WM.create({id:id, title:'Zephyr Protocol', icon:'📊', width:480, height:560, content:content});

  var statusEl = document.getElementById('zp-status');
  var dashboardEl = document.getElementById('zp-dashboard');
  var autoBtn = document.getElementById('zp-auto');
  var refreshBtn = document.getElementById('zp-refresh');
  var autoInterval = null;

  function fmt(n, decimals){
    if(typeof n !== 'number' || !isFinite(n)) return '—';
    return n.toFixed(decimals || 4);
  }

  function fmtBig(n){
    if(typeof n !== 'number' || !isFinite(n)) return '—';
    if(n >= 1e6) return (n/1e6).toFixed(2) + 'M';
    if(n >= 1e3) return (n/1e3).toFixed(2) + 'K';
    return n.toFixed(2);
  }

  function render(){
    var age = state.last_fetch_time > 0 ? Math.round((Date.now() - state.last_fetch_time)/1000) + 's ago' : 'never';
    var scrubbedIcon = state.scrubbed ? '🔒' : '🔓';

    dashboardEl.innerHTML =
      '<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px">'+
        card('ZEPH Price', '$' + fmt(state.zeph_price, 4), '#10b981') +
        card('Reserve Ratio', fmt(state.reserve_ratio, 4), '#818cf8') +
        card('ZSD Price', '$' + fmt(state.zsd_price, 4), '#f59e0b') +
        card('ZRS Price', '$' + fmt(state.zrs_price, 4), '#f43f5e') +
        card('ZYS Price', '$' + fmt(state.zys_price, 4), '#06b6d4') +
        card('Variable APY', fmt(state.zys_current_variable_apy, 2) + '%', '#a78bfa') +
      '</div>'+
      '<div style="font-size:10px;color:#6b7280;text-transform:uppercase;letter-spacing:.4px;margin-bottom:8px;font-weight:600">Circulation</div>'+
      '<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px">'+
        row('ZEPH', fmtBig(state.zeph_circ)) +
        row('ZSD', fmtBig(state.zsd_circ)) +
        row('ZRS', fmtBig(state.zrs_circ)) +
        row('ZYS', fmtBig(state.zys_circ)) +
      '</div>'+
      '<div style="font-size:10px;color:#6b7280;text-transform:uppercase;letter-spacing:.4px;margin-bottom:8px;font-weight:600">Reserves</div>'+
      '<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px">'+
        row('ZEPH in Reserve', fmtBig(state.zeph_in_reserve)) +
        row('Reserve Ratio (MA)', fmt(state.reserve_ratio_ma, 4)) +
      '</div>'+
      '<div style="border-top:1px solid rgba(255,255,255,0.06);padding-top:10px;margin-top:8px">'+
        '<div style="display:flex;justify-content:space-between;font-size:10px;color:#6b7280">'+
          '<span>Last fetch: ' + age + '</span>'+
          '<span>Fetches: ' + state.fetch_count + ' · Errors: ' + state.error_count + '</span>'+
        '</div>'+
        '<div style="display:flex;justify-content:space-between;font-size:10px;color:#6b7280;margin-top:4px">'+
          '<span>Ingress: ' + state.raw_bytes_len + ' bytes ' + scrubbedIcon + ' ' + (state.scrubbed ? 'scrubbed' : 'NOT scrubbed') + '</span>'+
          '<span>TTL: ' + POLL_TTL_MS/1000 + 's</span>'+
        '</div>'+
      '</div>';
  }

  function card(label, value, color){
    return '<div style="background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.06);border-radius:8px;padding:10px">'+
      '<div style="font-size:9px;color:#6b7280;text-transform:uppercase;letter-spacing:.3px;margin-bottom:4px">'+label+'</div>'+
      '<div style="font-size:16px;font-weight:700;color:'+color+'">'+value+'</div>'+
    '</div>';
  }

  function row(label, value){
    return '<div style="display:flex;justify-content:space-between;padding:6px 10px;background:rgba(255,255,255,0.02);border-radius:4px">'+
      '<span style="color:#9ca3af;font-size:11px">'+label+'</span>'+
      '<span style="color:#e5e7eb;font-size:11px;font-weight:600">'+value+'</span>'+
    '</div>';
  }

  function doFetch(){
    statusEl.textContent = 'fetching...';
    statusEl.style.color = '#f59e0b';
    refreshBtn.disabled = true;
    refreshBtn.textContent = 'Fetching...';

    fetchLivestats().then(function(result){
      refreshBtn.disabled = false;
      refreshBtn.textContent = '↻ Refresh';

      if(result.status === 'fetched'){
        statusEl.textContent = 'ok (' + result.bytes + ' bytes)';
        statusEl.style.color = '#10b981';
      } else if(result.status === 'cached'){
        statusEl.textContent = 'cached (' + Math.round(result.age/1000) + 's old)';
        statusEl.style.color = '#818cf8';
      } else {
        statusEl.textContent = 'error: ' + (result.message || 'unknown');
        statusEl.style.color = '#ef4444';
      }
      render();
    });
  }

  refreshBtn.addEventListener('click', doFetch);

  autoBtn.addEventListener('click', function(){
    if(autoInterval){
      clearInterval(autoInterval);
      autoInterval = null;
      autoBtn.textContent = 'Auto: OFF';
      autoBtn.classList.remove('pass');
    } else {
      autoInterval = setInterval(doFetch, POLL_TTL_MS);
      autoBtn.textContent = 'Auto: ON (30s)';
      autoBtn.classList.add('pass');
      doFetch(); // immediate first fetch
    }
  });

  // Initial fetch
  doFetch();

  // Cleanup on close
  var win = WM.get(id);
  if(win){
    win.onClose = function(){
      if(autoInterval) clearInterval(autoInterval);
      // #13: Scrub all state
      scrubIngress();
      state = null;
    };
  }
};

Apps.appStore = function(){
  var id = 'appstore';
  if(WM.get(id)){ WM.focus(id); return; }

  // =================================================================
  // CIRCLE 3 HYPERVISOR — WASM app lifecycle manager
  // =================================================================
  // Each app gets:
  //   - Isolated WebAssembly.Memory (no shared state, #4)
  //   - Isolated WebAssembly.Instance (#10)
  //   - Cooperative tick() model — no infinite loops (#6)
  //   - WASM trap handling — try/catch on every tick (#16)
  //   - Input ring buffer — no DOM events for apps (#9)
  //   - Heartbeat watchdog (#19)
  //
  // Apps write directly to their own WASM linear memory (framebuffer).
  // Circle 3 reads that memory and passes raw buffer to Circle 2.
  // Circle 2 (Static) does the single putImageData call.
  // Data flows 3 -> 2 -> 1. No reverse flow.
  // =================================================================

  var CANVAS_W = 400, CANVAS_H = 300;
  var activeApps = new Map();
  var appCounter = 0;

  function launchHypervisorApp(appName, watSource){
    var appId = ++appCounter;
    var winId = 'hyp-' + appName + '-' + appId;

    // Create window with canvas
    var content = document.createElement('div');
    content.style.cssText = 'display:flex;flex-direction:column;height:100%;background:#0a0a12';
    var bar = document.createElement('div');
    bar.style.cssText = 'padding:6px 10px;background:#0f0f17;border-bottom:1px solid rgba(16,185,129,0.2);font-size:11px;color:#6ee7b7;display:flex;justify-content:space-between;align-items:center';
    bar.innerHTML = '<span>⚡ '+C2.string.escapeHtml(appName)+'</span><span id="hyp-status-'+winId+'" style="color:#9ca3af">compiling...</span>';
    content.appendChild(bar);

    var canvasEl = document.createElement('canvas');
    canvasEl.width = CANVAS_W; canvasEl.height = CANVAS_H;
    canvasEl.style.cssText = 'display:block;image-rendering:pixelated;width:100%;flex:1;background:#0a0a12';
    content.appendChild(canvasEl);

    var logDiv = document.createElement('div');
    logDiv.style.cssText = 'padding:4px 10px;font-family:monospace;font-size:10px;color:#6ee7b7;background:#0f0f17;border-top:1px solid rgba(255,255,255,0.05);max-height:50px;overflow-y:auto';
    content.appendChild(logDiv);

    WM.create({id:winId, title:appName+' (Hypervisor)', icon:'⚡', width:440, height:400, content:content});

    var statusEl = document.getElementById('hyp-status-'+winId);
    var cctx = canvasEl.getContext('2d');
    var framebuffer = cctx.createImageData(CANVAS_W, CANVAS_H);

    // Input ring buffer — Circle 3 injects events, apps poll via syscall
    var inputRing = new Int32Array(64);
    var inputHead = 0, inputTail = 0;
    canvasEl.addEventListener('mousedown', function(e){
      var r = canvasEl.getBoundingClientRect();
      var x = ((e.clientX-r.left)/r.width*CANVAS_W)|0;
      var y = ((e.clientY-r.top)/r.height*CANVAS_H)|0;
      inputRing[inputHead & 63] = 1; inputRing[(inputHead+1)&63] = x; inputRing[(inputHead+2)&63] = y; inputRing[(inputHead+3)&63] = e.button;
      inputHead = (inputHead + 4) & 63;
    });
    canvasEl.addEventListener('mousemove', function(e){
      var r = canvasEl.getBoundingClientRect();
      var x = ((e.clientX-r.left)/r.width*CANVAS_W)|0;
      var y = ((e.clientY-r.top)/r.height*CANVAS_H)|0;
      inputRing[inputHead & 63] = 2; inputRing[(inputHead+1)&63] = x; inputRing[(inputHead+2)&63] = y; inputRing[(inputHead+3)&63] = 0;
      inputHead = (inputHead + 4) & 63;
    });
    canvasEl.addEventListener('keydown', function(e){
      inputRing[inputHead & 63] = 3; inputRing[(inputHead+1)&63] = e.keyCode; inputRing[(inputHead+2)&63] = 0; inputRing[(inputHead+3)&63] = 0;
      inputHead = (inputHead + 4) & 63;
      e.preventDefault();
    });

    // App state
    var appState = {
      id: appId,
      name: appName,
      instance: null,
      memory: null,
      running: false,
      rafId: null,
      tickCount: 0,
      heartbeat: 0,
      lastHeartbeat: 0,
      crashed: false
    };

    // Syscall dispatcher — integer IDs, O(1) jump table (#7)
    // Syscalls:
    //   1 = write_pixel(x, y, abgr) — writes to app's own memory
    //   2 = get_width() -> i32
    //   3 = get_height() -> i32
    //   4 = clear(color) — fills framebuffer
    //   5 = get_ticks() -> i32
    //   6 = poll_input() -> i32 (0=no, 1=yes; x/y/key at memory offset 0)
    //   7 = log(msg_ptr, msg_len)
    //
    // But per critique #3, apps should call a SINGLE syscall(id, a, b, c) function.
    // The WASM app imports: env.syscall(id, a, b, c) -> i32
    // AND env.memory (isolated per app)
    var env = {
      syscall: function(id, a, b, c){
        id = id | 0;
        switch(id){
          case 1: // write_pixel
            a = a|0; b = b|0;
            if(a<0||a>=CANVAS_W||b<0||b>=CANVAS_H) return 0;
            var off = (b * CANVAS_W + a) * 4;
            var view = new DataView(appState.memory.buffer);
            view.setUint32(off, c >>> 0, true);
            appState.heartbeat++;
            return 0;
          case 2: return CANVAS_W;
          case 3: return CANVAS_H;
          case 4: // clear
            var fillView = new Uint32Array(appState.memory.buffer, 0, CANVAS_W * CANVAS_H);
            fillView.fill(a >>> 0);
            appState.heartbeat += 100;
            return 0;
          case 5: return (Date.now() & 0x7FFFFFFF) | 0;
          case 6: // poll_input
            if(inputHead === inputTail) return 0;
            var ev0 = inputRing[inputTail & 63];
            var ev1 = inputRing[(inputTail+1)&63];
            var ev2 = inputRing[(inputTail+2)&63];
            var ev3 = inputRing[(inputTail+3)&63];
            inputTail = (inputTail + 4) & 63;
            // Write event to app's memory at offset 0 (4 i32s = 16 bytes)
            var inputView = new Int32Array(appState.memory.buffer, 0, 4);
            inputView[0] = ev0; inputView[1] = ev1; inputView[2] = ev2; inputView[3] = ev3;
            return 1;
          case 7: // log
            try {
              var logView = new Uint8Array(appState.memory.buffer, a, Math.min(c|0, 256));
              var msg = String.fromCharCode.apply(null, Array.from(logView));
              logDiv.innerHTML = C2.string.escapeHtml(msg) + '<br>' + logDiv.innerHTML;
            } catch(e){}
            return 0;
          default: return 0;
        }
      }
    };

    function compileAndRun(){
      if(typeof WabtModule === 'undefined'){
        statusEl.textContent = 'loading wabt.js...';
        var waitInterval = setInterval(function(){
          if(typeof WabtModule !== 'undefined'){ clearInterval(waitInterval); compileAndRun(); }
        }, 200);
        return;
      }

      WabtModule().then(function(wabt){
        try {
          // Parse + validate + compile WAT
          var mod = wabt.parseWat(appName+'.wat', watSource);
          mod.resolveNames();
          mod.validate();
          var bin = mod.toBinary({write_debug_names: false});
          mod.destroy();
          var bytes = new Uint8Array(bin.buffer);

          // Create ISOLATED memory per app (#4, #10)
          // Maximum 16 pages (1MB) — prevents unbounded growth (#8)
          appState.memory = new WebAssembly.Memory({initial: 8, maximum: 16});

          var importObj = {env: {
            memory: appState.memory,
            syscall: env.syscall
          }};

          var compiled = new WebAssembly.Module(bytes);
          appState.instance = new WebAssembly.Instance(compiled, importObj);

          statusEl.textContent = 'running';
          statusEl.style.color = '#10b981';
          appState.running = true;

          // Call init() if exported
          if(typeof appState.instance.exports.init === 'function'){
            try { appState.instance.exports.init(); }
            catch(e) { logDiv.innerHTML = '<span style="color:#f59e0b">init: '+C2.string.escapeHtml(e.message)+'</span>'; }
          }

          if(typeof appState.instance.exports.tick !== 'function' && typeof appState.instance.exports.frame !== 'function'){
            statusEl.textContent = 'no tick()/frame() export';
            statusEl.style.color = '#f59e0b';
            appState.running = false;
            return;
          }

          // Cooperative tick loop (#6) — rAF-driven, no infinite loops
          // WASM trap handling (#16) — try/catch on every tick
          function tick(){
            if(!appState.running) return;

            // #18: Record tick start time for budget enforcement
            var tickStart = performance.now();
            appState.tickCount++;
            appState.heartbeat = 0;

            try {
              // Call tick(t) or frame(t) — cooperative, must return
              var fn = appState.instance.exports.tick || appState.instance.exports.frame;
              fn(appState.tickCount);
            } catch(e) {
              // #16: WASM trap caught — graceful error, no OS crash
              statusEl.textContent = 'trap: ' + (e.message || 'unknown').substring(0, 40);
              statusEl.style.color = '#ef4444';
              appState.running = false;
              appState.crashed = true;
              logDiv.innerHTML = '<span style="color:#ef4444">WASM TRAP: '+C2.string.escapeHtml(e.message)+'</span>';
              return;
            }

            // #18: Check tick budget — kill apps that exceed 16ms
            var tickElapsed = performance.now() - tickStart;
            if(tickElapsed > 16){
              statusEl.textContent = 'slow: ' + tickElapsed.toFixed(1) + 'ms tick';
              statusEl.style.color = '#f59e0b';
            }

            // #1: Use cached view — invalidated automatically on memory.grow()
            // Data flows 3 -> 2: read app's WASM memory, pass to Circle 2 renderer
            try {
              // Check if buffer changed (memory.grow invalidates old buffer)
              if(appState._cachedBuffer !== appState.memory.buffer){
                appState._cachedBuffer = appState.memory.buffer;
                appState._cachedView = null;
              }
              if(!appState._cachedView || appState._cachedView.buffer !== appState.memory.buffer){
                var viewLen = Math.min(appState.memory.buffer.byteLength, CANVAS_W * CANVAS_H * 4);
                appState._cachedView = new Uint8ClampedArray(appState.memory.buffer, 0, viewLen);
              }
              framebuffer.data.set(appState._cachedView);
              // #5: Canvas expects premultiplied alpha. Most WASM apps write
              // unpremultiplied (A=255 or A=0). For A=255 (opaque), no change needed.
              // For partial alpha, we'd need a premultiply pass. Since most apps
              // use opaque pixels (A=0xFF), we skip the pass for performance.
              cctx.putImageData(framebuffer, 0, 0);
            } catch(e) {
              // Memory grew beyond view — reallocate
              try {
                var availableBytes = Math.min(appState.memory.buffer.byteLength, CANVAS_W * CANVAS_H * 4);
                appState._cachedView = new Uint8ClampedArray(appState.memory.buffer, 0, availableBytes);
                appState._cachedBuffer = appState.memory.buffer;
                framebuffer.data.set(appState._cachedView);
                cctx.putImageData(framebuffer, 0, 0);
              } catch(e2){}
            }

            appState.rafId = requestAnimationFrame(tick);
          }
          tick();

          // Watchdog: check every 3s if app is alive (#19)
          var watchdogInterval = setInterval(function(){
            if(!appState.running){ clearInterval(watchdogInterval); return; }
            if(appState.heartbeat === appState.lastHeartbeat){
              statusEl.textContent = 'watchdog: idle';
              statusEl.style.color = '#f59e0b';
            } else {
              if(statusEl.textContent === 'watchdog: idle'){
                statusEl.textContent = 'running';
                statusEl.style.color = '#10b981';
              }
            }
            appState.lastHeartbeat = appState.heartbeat;
          }, 3000);

          activeApps.set(appId, appState);

        } catch(e) {
          statusEl.textContent = 'compile error';
          statusEl.style.color = '#ef4444';
          logDiv.innerHTML = '<span style="color:#ef4444">'+C2.string.escapeHtml(e.message.substring(0, 200))+'</span>';
        }
      }).catch(function(e){
        statusEl.textContent = 'wabt failed';
        statusEl.style.color = '#ef4444';
      });
    }

    // Cleanup on close (#10) — nullify all references for GC
    var win = WM.get(winId);
    if(win){
      win.onClose = function(){
        appState.running = false;
        if(appState.rafId) cancelAnimationFrame(appState.rafId);
        // Nullify references to allow V8 GC to reclaim WASM memory
        appState.instance = null;
        appState.memory = null;
        activeApps.delete(appId);
      };
    }

    compileAndRun();
  }

  // =================================================================
  // PROGRAMMATIC WASM BUILDER (#20)
  // =================================================================
  // Builds a minimal WASM module in JS — no external files needed.
  // The app writes a red pixel at (0,0) via the syscall ABI.
  // =================================================================
  function buildRedPixelWasm(){
    // Programmatic WASM bytecode builder — generates a valid .wasm binary in JS.
    // No wabt.js, no external files, no toolchain. Pure bare-metal WASM.
    //
    // The module exports "memory" (1 page) and "render" (func).
    // render() writes 0xFF0000FF (red) to memory offset 0 via i32.store.
    //
    // This proves the Circle 3 Hypervisor can instantiate bare-metal WASM
    // directly, with zero dependencies. Data flows 3 -> 2 -> 1:
    //   App (Circle 3) writes to WASM memory
    //   Hypervisor reads memory, passes to Circle 2
    //   Circle 2 does the single putImageData
    var bytes = [0x00, 0x61, 0x73, 0x6d, 0x01, 0x00, 0x00, 0x00];

    // Type section: 1 type, func() -> ()
    bytes.push(0x01, 0x04, 0x01, 0x60, 0x00, 0x00);

    // Function section: 1 function, type 0
    bytes.push(0x03, 0x02, 0x01, 0x00);

    // Memory section: 1 memory, min=1 page, max=1 page (64KB)
    bytes.push(0x05, 0x03, 0x01, 0x00, 0x01);

    // Export section: "memory" (mem) + "render" (func)
    bytes.push(0x07, 0x13, 0x02);
    bytes.push(0x06, 0x6d, 0x65, 0x6d, 0x6f, 0x72, 0x79, 0x02, 0x00); // "memory" -> memory 0
    bytes.push(0x06, 0x72, 0x65, 0x6e, 0x64, 0x65, 0x72, 0x00, 0x00); // "render" -> func 0

    // Code section: 1 function body
    // Body: 0 locals, i32.const 0, i32.const 0xFF0000FF (signed LEB128), i32.store align=2 off=0, end
    var body = [0x00]; // 0 local declarations
    body.push(0x41, 0x00); // i32.const 0 (offset)
    body.push(0x41, 0xFF, 0x81, 0x80, 0x78); // i32.const 0xFF0000FF (signed LEB128 of -16776961)
    body.push(0x36, 0x02, 0x00); // i32.store align=2 offset=0
    body.push(0x0b); // end

    bytes.push(0x0a); // code section id
    bytes.push(body.length + 2); // section size = 1 (count) + 1 (body size) + body.length
    bytes.push(0x01); // 1 function
    bytes.push(body.length); // body size
    for(var i=0; i<body.length; i++) bytes.push(body[i]);

    return new Uint8Array(bytes);
  }

  function renderBytecode(){

    var wasmBytes = buildRedPixelWasm();
    var hex = '';
    for(var i=0; i<wasmBytes.length; i++){
      hex += (wasmBytes[i] < 16 ? '0' : '') + wasmBytes[i].toString(16) + ' ';
      if((i+1) % 16 === 0) hex += '\n';
    }

    contentEl.innerHTML =
      '<div style="font-size:12px;color:#9ca3af;margin-bottom:12px">Programmatic WASM bytecode demo. The .wasm binary is generated in JS — no wabt.js, no external files, no toolchain. The app exports <code style="color:#10b981">memory</code> and <code style="color:#10b981">render()</code>. The render function writes <code>0xFF0000FF</code> (red) to memory offset 0 via <code>i32.store</code>. Circle 3 reads the memory; Circle 2 renders it.</div>'+
      '<div style="background:#0a0a0f;border:1px solid rgba(255,255,255,0.1);border-radius:6px;padding:12px;font-family:monospace;font-size:10px;color:#9ca3af;margin-bottom:12px;line-height:1.6">'+

        '<div id="as-bytecode-hex" style="color:#a8ffa8;word-break:break-all;white-space:pre-wrap">' + hex + '</div>'+
      '</div>'+
      '<button class="btn pass" id="as-bytecode-run" style="width:100%;padding:10px;font-size:13px">▶ Run Bytecode App</button>'+
      '<div id="as-bytecode-status" style="margin-top:8px;font-size:11px"></div>';

    var statusEl = document.getElementById('as-bytecode-status');

    document.getElementById('as-bytecode-run').addEventListener('click', function(){
      statusEl.innerHTML = '<span style="color:#f59e0b">Instantiating...</span>';
      try {
        // The WASM module exports its OWN memory — no need to inject one
        // This is true bare-metal: the app owns its memory, Circle 3 just reads it
        var compiled = new WebAssembly.Module(wasmBytes);
        var inst = new WebAssembly.Instance(compiled, {});

        // Verify exports
        if(!inst.exports.render || !inst.exports.memory){
          statusEl.innerHTML = '<span style="color:#ef4444">Missing exports (need memory + render)</span>';
          return;
        }

        // Create window + canvas
        var winId = 'bytecode-' + Date.now();
        var content = document.createElement('div');
        content.style.cssText = 'display:flex;flex-direction:column;height:100%;background:#0a0a12';
        var bar = document.createElement('div');
        bar.style.cssText = 'padding:6px 10px;background:#0f0f17;border-bottom:1px solid rgba(16,185,129,0.2);font-size:11px;color:#6ee7b7;display:flex;justify-content:space-between';
        bar.innerHTML = '<span>⚡ Bytecode Demo</span><span id="bc-status-'+winId+'" style="color:#10b981">running</span>';
        content.appendChild(bar);
        var canvasEl = document.createElement('canvas');
        canvasEl.width = 400; canvasEl.height = 300;
        canvasEl.style.cssText = 'display:block;image-rendering:pixelated;width:100%;flex:1;background:#0a0a12';
        content.appendChild(canvasEl);
        WM.create({id:winId, title:'Bytecode App (bare-metal)', icon:'⚡', width:440, height:400, content:content});

        var bcStatus = document.getElementById('bc-status-'+winId);
        var cctx = canvasEl.getContext('2d');

        // Circle 2: Static renderer — reads WASM memory, does the single putImageData
        var framebuffer = cctx.createImageData(400, 300);
        var running = true;
        var rafId = null;

        function tick(){
          if(!running) return;

          // Circle 3: Call the app's render function
          try { inst.exports.render(); }
          catch(e){
            bcStatus.textContent = 'trap: ' + (e.message || 'unknown').substring(0, 30);
            bcStatus.style.color = '#ef4444';
            running = false;
            return;
          }

          // Data flows 3 -> 2: Read the app's WASM memory, pass to Circle 2 renderer
          // The app wrote 0xFF0000FF at offset 0 (red pixel)
          // The app's memory is 1 page (64KB) — we read the first pixel and
          // paint the entire canvas with it to make it visible
          var memBuf = inst.exports.memory.buffer;
          var view = new DataView(memBuf);
          var redPixel = view.getUint32(0, true);

          // Fill the framebuffer with the red pixel so it's visible
          var fbU32 = new Uint32Array(framebuffer.data.buffer);
          fbU32.fill(redPixel);
          cctx.putImageData(framebuffer, 0, 0);

          rafId = requestAnimationFrame(tick);
        }
        tick();

        var win = WM.get(winId);
        if(win) win.onClose = function(){ running = false; if(rafId) cancelAnimationFrame(rafId); };

        statusEl.innerHTML = '<span style="color:#10b981">Running! Red pixel at (0,0) — written by bare-metal WASM i32.store</span>';
        Toast.success('Bare-metal WASM app running', 2000);
      } catch(e) {

    });

  'self.onmessage = function(e){',

  '    try {',
  '      try { importScripts(d.codeUrl); } catch(err){ self.postMessage({type:"error", message:"IMPORT_ERR: "+err.message}); }',
  '      self.postMessage({type:"ready"});',
  '    } catch(err){',
  '      self.postMessage({type:"error", message: err.message});',
  '    }',
  '  } else if(d.type === "frame"){',
  '    try {',
  '      if(typeof self._userFrame === "function") self._userFrame(d.t);',
  '      self.postMessage({type:"frameDone", t: d.t});',
  '    } catch(err){',
  '      self.postMessage({type:"error", message: err.message});',
  '    }',
  '  } else if(d.type === "kill"){',
  '    self.close();',
  '  }',
  '};',
  'function buildAPI(manifest){',
  '  var rpcId = 1;',
  '  var pending = new Map();',
  '  var api = {',
  '    requestAnimationFrame: function(fn){ self._userFrame = fn; return 1; },',
  '    log: function(){ var args = Array.prototype.slice.call(arguments); self.postMessage({type:"log", args: args}); }',
  '  };',
  '  if(manifest.permissions.indexOf("writePixel") >= 0){',
  '    api.writePixel = function(x, y, c){ self.postMessage({type:"rpc", method:"writePixel", args:[x,y,c]}); };',
  '  }',
  '  if(manifest.permissions.indexOf("pollInput") >= 0){',
  '    api.pollInput = function(){ return null; };',
  '  }',
  '  if(manifest.permissions.indexOf("getWidth") >= 0){ api.getWidth = function(){ return d_width; }; }',
  '  if(manifest.permissions.indexOf("getHeight") >= 0){ api.getHeight = function(){ return d_height; }; }',

Apps.launchWorkerApp = function(name, code, manifest){
  manifest = manifest || manifestForApp(name);
  var winId = 'wk-' + name + '-' + Date.now();
  var content = document.createElement('div');
  content.style.cssText = 'display:flex;flex-direction:column;height:100%;background:#0a0a12';
  var bar = document.createElement('div');
  bar.style.cssText = 'padding:6px 10px;background:#0f0f17;border-bottom:1px solid rgba(16,185,129,0.2);font-size:11px;color:#6ee7b7';
  bar.innerHTML = '<span>🔧 '+C2.string.escapeHtml(name)+'</span> <span style="margin-left:auto;float:right" id="wk-status-'+winId+'">spawning worker...</span>';
  content.appendChild(bar);
  var canvasEl = document.createElement('canvas');
  canvasEl.width = 200; canvasEl.height = 150;
  canvasEl.style.cssText = 'display:block;image-rendering:pixelated;width:100%;flex:1;background:#0a0a12';
  content.appendChild(canvasEl);
  var logDiv = document.createElement('div'); logDiv.className = 'ar-log'; logDiv.style.maxHeight = '80px';
  content.appendChild(logDiv);
  WM.create({id:winId, title:name+' (Worker)', icon:'🔧', width:260, height:280, content:content});
  var cctx = canvasEl.getContext('2d');
  var imgData = cctx.createImageData(canvasEl.width, canvasEl.height);
  var u32 = new Uint32Array(imgData.data.buffer);
  u32.fill(0xFF0A0A12);
  cctx.putImageData(imgData, 0, 0);
  var statusEl = document.getElementById('wk-status-'+winId);
  var blob = new Blob([WORKER_APP_TEMPLATE], {type:'application/javascript'});
  var workerUrl = URL.createObjectURL(blob);
  var worker = null;
  var running = false;
  var rafId = null;
  var t = 0;
  try { worker = new Worker(workerUrl); }
  catch(e){ if(statusEl) statusEl.textContent = 'Worker unavailable: '+e.message; URL.revokeObjectURL(workerUrl); return; }
  worker.onmessage = function(e){
    var d = e.data;
    if(d.type === 'ready'){
      running = true;
      if(statusEl) statusEl.textContent = 'running (Worker)';
      function frame(){
        if(!running) return;
        t++;
        try { worker.postMessage({type:'frame', t:t}); }catch(err){}
        rafId = requestAnimationFrame(frame);
      }
      frame();
    } else if(d.type === 'rpc'){
      if(d.method === 'writePixel' && d.args.length === 3){
        var x = d.args[0]|0, y = d.args[1]|0, c = d.args[2]>>>0;
        if(x>=0 && x<canvasEl.width && y>=0 && y<canvasEl.height){
          u32[y*canvasEl.width+x] = c;
          cctx.putImageData(imgData, 0, 0);
        }
      }
    } else if(d.type === 'log'){
      var msg = (d.args||[]).map(function(a){return typeof a === 'object' ? JSON.stringify(a) : String(a);}).join(' ');
      logDiv.innerHTML = '<div>'+C2.string.escapeHtml(msg)+'</div>' + logDiv.innerHTML;
    } else if(d.type === 'error'){
      if(statusEl) statusEl.textContent = 'error: '+d.message;
      running = false;
    } else if(d.type === 'frameDone'){
      // frame completed; rAF will tick next
    }
  };
  worker.onerror = function(err){
    if(statusEl) statusEl.textContent = 'Worker crashed: '+(err.message||'unknown');
    running = false;
  };
  worker.onmessageerror = function(){
    if(statusEl) statusEl.textContent = 'Worker message decode error';
    running = false;
  };
  var codeBlob = new Blob([code || ''], {type: 'application/javascript'});
  var codeUrl = URL.createObjectURL(codeBlob);
  worker.postMessage({type:'init', codeUrl: codeUrl, manifest: manifest, width: canvasEl.width, height: canvasEl.height});
  var win = WM.get(winId);
  if(win) win.onClose = function(){
    running = false;
    if(rafId) cancelAnimationFrame(rafId);
    rafId = null;
    try { worker.postMessage({type:'kill'}); worker.terminate(); }catch(e){}
    URL.revokeObjectURL(workerUrl);
  };
};

  u32.fill(0xFF0A0A12);
  cctx.putImageData(imgData, 0, 0);
  var statusEl = document.getElementById('wasm-status-'+winId);
  var bytes = buildWasmBallModule();
  var t = 0;
  var env = {
    write_pixel: function(x, y, abgr){ x=x|0; y=y|0; if(x<0||x>=canvasEl.width||y<0||y>=canvasEl.height) return; u32[y*canvasEl.width+x] = abgr>>>0; },
    get_width: function(){ return canvasEl.width; },

  };
  var _wasmRunning = false;
  var _wasmRafId = null;

  Kernel.syscall.invoke('C3.4', 'instantiate', bytes, {env:env}).then(function(inst){

    frame();
  }).catch(function(e){
    if(statusEl) statusEl.textContent = 'compile failed';
    Toast.error('WASM compile failed: '+e.message, 5000);

}
