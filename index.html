<!DOCTYPE html>
<html lang="en">
<head>

<meta http-equiv="X-UA-Compatible" content="IE=edge">

<script src="https://cdn.jsdelivr.net/npm/wabt@1.0.39/index.js" id="wabt-loader" async></script>
<title>Zephyr OS v7.1.0</title>
<style>

*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;font-family:'Segoe UI',system-ui,-apple-system,sans-serif;background:#000;color:#e5e7eb;user-select:none;-webkit-user-select:none;font-size:13px}
button{font-family:inherit;cursor:pointer}
input,textarea{font-family:inherit}
::-webkit-scrollbar{width:8px;height:8px}
::-webkit-scrollbar-track{background:rgba(0,0,0,0.15)}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.12);border-radius:4px;transition:background .15s}
::-webkit-scrollbar-thumb:hover{background:rgba(16,185,129,0.3)}
::-webkit-scrollbar-corner{background:transparent}


#wallpaper-canvas{position:fixed;inset:0;z-index:0;display:block}
#wallpaper-overlay{position:fixed;inset:0;z-index:1;background:radial-gradient(ellipse at 65% 75%,rgba(16,185,129,0.08),transparent 45%),radial-gradient(ellipse at 30% 20%,rgba(20,80,120,0.22),transparent 50%),radial-gradient(ellipse at 80% 10%,rgba(99,102,241,0.06),transparent 40%);pointer-events:none}


#desktop{position:fixed;inset:0;z-index:2}
#icons{position:absolute;top:10px;left:10px;display:flex;flex-direction:column;flex-wrap:wrap;gap:2px;max-height:calc(100vh - 60px)}
.desktop-icon{width:86px;display:flex;flex-direction:column;align-items:center;gap:4px;padding:8px 4px;border-radius:6px;cursor:pointer;text-align:center;transition:background .12s,transform .12s}
.desktop-icon:hover{background:rgba(255,255,255,0.07);transform:translateY(-1px)}
.desktop-icon:active{transform:scale(.96)}
.desktop-icon.selected{background:rgba(16,185,129,0.18);outline:1px solid rgba(16,185,129,0.35)}
.desktop-icon .ic{width:42px;height:42px;display:flex;align-items:center;justify-content:center;font-size:30px;filter:drop-shadow(0 2px 3px rgba(0,0,0,0.5));transition:transform .12s}
.desktop-icon:hover .ic{transform:scale(1.08)}
.desktop-icon .lbl{font-size:11px;color:#f3f4f6;text-shadow:0 1px 3px rgba(0,0,0,0.9);max-width:82px;word-break:break-word;line-height:1.2}


#windows{position:absolute;inset:0;z-index:3;pointer-events:none}
.window{position:absolute;background:#1b1b25;border:1px solid rgba(255,255,255,0.07);border-radius:8px;box-shadow:0 24px 70px rgba(0,0,0,0.6),0 0 0 1px rgba(0,0,0,0.25);display:flex;flex-direction:column;overflow:hidden;min-width:300px;min-height:200px;pointer-events:auto;transition:opacity .12s,box-shadow .15s}
.window.focused{box-shadow:0 24px 70px rgba(0,0,0,0.65),0 0 0 1px rgba(16,185,129,0.25),0 0 24px rgba(16,185,129,0.08)}
.window.opening{animation:winOpen .14s ease-out}
.window.closing{animation:winClose .1s ease-in forwards}
.window.minimizing{animation:winMin .12s ease-in forwards}
@keyframes winOpen{from{opacity:0;transform:scale(.96) translateY(8px)}to{opacity:1;transform:scale(1) translateY(0)}}
@keyframes winClose{to{opacity:0;transform:scale(.96)}}
@keyframes winMin{to{opacity:0;transform:translateY(40px) scale(.9)}}
body.no-anim .window{animation:none!important;transition:none!important}
body.no-anim .window.opening{opacity:1;transform:none}
body.no-anim .window.closing{opacity:0}
body.no-anim .window.minimizing{opacity:0}
.window.maximized{top:0!important;left:0!important;width:100vw!important;height:calc(100vh - 48px)!important;border-radius:0;border:none}
.window.widget{border-radius:10px;overflow:hidden;border:1px solid rgba(16,185,129,0.3);box-shadow:0 8px 30px rgba(0,0,0,0.6),0 0 0 1px rgba(16,185,129,0.15)}
.window.widget .titlebar{display:none}
.window.widget .win-content{border-radius:10px}
.titlebar{height:36px;background:linear-gradient(180deg,#22222e,#191921);display:flex;align-items:center;padding:0 0 0 12px;cursor:default;user-select:none;flex-shrink:0;border-bottom:1px solid rgba(0,0,0,0.35)}
.titlebar .wi{font-size:14px;margin-right:8px;line-height:1;width:22px;height:22px;display:flex;align-items:center;justify-content:center;background:rgba(16,185,129,0.12);border-radius:5px;flex-shrink:0}
.titlebar .wt{flex:1;font-size:12px;color:#d1d5db;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-weight:500}
.titlebar .ctrls{display:flex;height:100%}
.titlebar .ctrl{width:46px;height:100%;display:flex;align-items:center;justify-content:center;color:#9ca3af;font-size:11px;transition:background .12s,color .12s}
.titlebar .ctrl:hover{background:rgba(255,255,255,0.1);color:#e5e7eb}
.titlebar .ctrl:active{background:rgba(255,255,255,0.16)}
.titlebar .ctrl.close:hover{background:#e81123;color:#fff}
.titlebar .ctrl.close:active{background:#c00f1f}
.titlebar .ctrl svg{width:11px;height:11px;fill:currentColor}
.win-content{flex:1;overflow:auto;background:#13131b;color:#e5e7eb;position:relative}
.resizer{position:absolute;right:0;bottom:0;width:14px;height:14px;cursor:nwse-resize;z-index:5}
.resizer::after{content:'';position:absolute;right:3px;bottom:3px;width:6px;height:6px;border-right:2px solid rgba(255,255,255,0.2);border-bottom:2px solid rgba(255,255,255,0.2)}


#taskbar{position:fixed;bottom:0;left:0;right:0;height:48px;background:rgba(10,10,16,0.72);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);border-top:1px solid rgba(255,255,255,0.05);display:flex;align-items:center;justify-content:center;z-index:100000}
.taskbar-center{display:flex;align-items:center;gap:4px}
.tb-app{width:42px;height:42px;display:flex;align-items:center;justify-content:center;border-radius:6px;cursor:pointer;font-size:22px;position:relative;transition:background .12s,transform .1s}
.tb-app:hover{background:rgba(255,255,255,0.08);transform:translateY(-2px)}
.tb-app:active{transform:translateY(0) scale(.94)}
.tb-app.active{background:rgba(255,255,255,0.12)}
.tb-app[data-app]::before{content:attr(title);position:absolute;bottom:52px;left:50%;transform:translateX(-50%);background:rgba(18,18,28,0.96);color:#e5e7eb;padding:4px 10px;border-radius:4px;font-size:10px;white-space:nowrap;pointer-events:none;opacity:0;transition:opacity .15s;border:1px solid rgba(255,255,255,0.08);z-index:100001}
.tb-app[data-app]:hover::before{opacity:1}
.tb-app.active::after{content:'';position:absolute;bottom:3px;left:50%;transform:translateX(-50%);width:16px;height:3px;background:#10b981;border-radius:2px}
.tb-app.running:not(.active)::after{content:'';position:absolute;bottom:3px;left:50%;transform:translateX(-50%);width:6px;height:3px;background:#6b7280;border-radius:2px}
#tray{position:absolute;right:6px;top:0;bottom:0;display:flex;align-items:center;gap:10px;padding:0 12px;cursor:pointer}
#tray:hover{background:rgba(255,255,255,0.06)}
#clock{text-align:right;line-height:1.15}
#clock .t{font-size:12px;color:#f3f4f6}
#clock .d{font-size:10px;color:#9ca3af}
#tray-badges{display:flex;align-items:center;gap:6px}
.tray-badge{font-size:9px;color:#9ca3af;padding:2px 5px;background:rgba(255,255,255,0.06);border-radius:3px}


#start-menu{position:fixed;bottom:56px;left:50%;transform:translateX(-50%);width:600px;max-width:92vw;max-height:70vh;background:rgba(18,18,28,0.94);backdrop-filter:blur(32px);-webkit-backdrop-filter:blur(32px);border:1px solid rgba(255,255,255,0.08);border-radius:12px;box-shadow:0 24px 70px rgba(0,0,0,0.7);padding:28px 24px 52px;z-index:100001;display:none;overflow-y:auto}
#start-menu.open{display:block;animation:startOpen .16s ease-out}
@keyframes startOpen{from{opacity:0;transform:translateX(-50%) translateY(12px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
.start-search{width:100%;padding:9px 14px;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);border-radius:6px;color:#f3f4f6;font-size:13px;margin-bottom:20px}
.start-search:focus{outline:none;border-color:rgba(16,185,129,0.5);background:rgba(255,255,255,0.08)}
.start-label{font-size:11px;color:#9ca3af;margin-bottom:10px;font-weight:600;letter-spacing:.4px}
.start-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:4px}
.start-app{display:flex;flex-direction:column;align-items:center;gap:6px;padding:14px 8px;border-radius:6px;cursor:pointer;text-align:center;transition:background .12s,transform .12s}
.start-app:hover{background:rgba(255,255,255,0.06);transform:translateY(-2px)}
.start-app:active{transform:translateY(0) scale(.96)}
.start-app .ic{font-size:30px}
.start-app .nm{font-size:11px;color:#e5e7eb;max-width:90px;word-break:break-word;line-height:1.2}
.start-power{position:absolute;bottom:14px;right:18px;display:flex;gap:4px}
.start-power .pwr{width:34px;height:34px;border-radius:6px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:#9ca3af;font-size:15px}
.start-power .pwr:hover{background:rgba(255,255,255,0.08);color:#f87171}


#boot{position:fixed;inset:0;background:radial-gradient(ellipse at center,#0a0a14 0%,#000 70%);z-index:200000;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:24px;transition:opacity .6s}
#boot.hidden{opacity:0;pointer-events:none}
.boot-logo{font-size:52px;font-weight:200;color:#10b981;letter-spacing:3px;text-shadow:0 0 40px rgba(16,185,129,0.4),0 0 80px rgba(16,185,129,0.15)}
.boot-version{font-size:12px;color:#6b7280;letter-spacing:1px}
.boot-spinner{width:30px;height:30px;border:2px solid rgba(16,185,129,0.18);border-top-color:#10b981;border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.boot-bar{width:220px;height:3px;background:rgba(255,255,255,0.08);border-radius:2px;overflow:hidden}
.boot-bar-fill{height:100%;background:linear-gradient(90deg,#10b981,#34d399);width:0;transition:width .4s;border-radius:2px;box-shadow:0 0 8px rgba(16,185,129,0.5)}
.boot-tip{font-size:10px;color:#4b5563;letter-spacing:.5px;height:14px;transition:opacity .2s}

@keyframes toastIn{from{opacity:0;transform:translateX(30px)}to{opacity:1;transform:translateX(0)}}


.tm-tabs{display:flex;border-bottom:1px solid rgba(255,255,255,0.07);background:#181820;flex-shrink:0}
.tm-tab{padding:9px 14px;font-size:11px;color:#9ca3af;cursor:pointer;border-bottom:2px solid transparent;transition:color .1s,background .1s;font-weight:500}
.tm-tab:hover{color:#e5e7eb;background:rgba(255,255,255,0.03)}
.tm-tab.active{color:#10b981;border-bottom-color:#10b981;background:rgba(16,185,129,0.06)}
.tm-body{padding:14px;font-size:12px;overflow-y:auto;flex:1}
.tm-section{margin-bottom:14px}
.tm-section h3{font-size:11px;text-transform:uppercase;color:#9ca3af;margin-bottom:8px;letter-spacing:.4px;font-weight:600}
.tm-table{width:100%;border-collapse:collapse}
.tm-table th{text-align:left;padding:6px 8px;font-size:9px;text-transform:uppercase;color:#6b7280;border-bottom:1px solid rgba(255,255,255,0.08);font-weight:700;letter-spacing:.4px;position:sticky;top:0;background:#13131b}
.tm-table td{padding:5px 8px;border-bottom:1px solid rgba(255,255,255,0.04);font-family:'Cascadia Code','Consolas',monospace;font-size:11px}
.tm-table tr:hover td{background:rgba(255,255,255,0.02)}
.badge{display:inline-block;padding:2px 6px;border-radius:3px;font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.3px}
.badge.critical{background:rgba(239,68,68,0.18);color:#fca5a5}
.badge.high{background:rgba(245,158,11,0.18);color:#fcd34d}
.badge.medium{background:rgba(16,185,129,0.18);color:#6ee7b7}
.badge.pass{background:rgba(16,185,129,0.2);color:#6ee7b7}
.badge.fail{background:rgba(239,68,68,0.2);color:#fca5a5}
.badge.locked{background:rgba(16,185,129,0.15);color:#6ee7b7}
.badge.unlocked{background:rgba(107,114,128,0.2);color:#9ca3af}
.btn{padding:6px 12px;background:rgba(16,185,129,0.14);border:1px solid rgba(16,185,129,0.3);color:#6ee7b7;border-radius:4px;font-size:11px;font-weight:500;transition:background .1s}
.btn:hover{background:rgba(16,185,129,0.24)}
.btn:active{transform:scale(.97)}
.btn.sec{background:rgba(255,255,255,0.05);border-color:rgba(255,255,255,0.1);color:#d1d5db}
.btn.sec:hover{background:rgba(255,255,255,0.1)}
.btn.danger{background:rgba(239,68,68,0.12);border-color:rgba(239,68,68,0.3);color:#fca5a5}
.btn.danger:hover{background:rgba(239,68,68,0.2)}
.btn:disabled{opacity:.4;cursor:default}
.progress{height:7px;background:rgba(255,255,255,0.08);border-radius:4px;overflow:hidden}
.progress-bar{height:100%;background:linear-gradient(90deg,#10b981,#34d399);transition:width .3s;border-radius:4px}
.kv{display:flex;justify-content:space-between;padding:4px 0;border-bottom:1px solid rgba(255,255,255,0.04);font-size:11px}
.kv .k{color:#9ca3af}
.kv .v{color:#f3f4f6;font-family:'Cascadia Code','Consolas',monospace}
input.tm-input,textarea.tm-input{width:100%;padding:7px 10px;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);border-radius:4px;color:#f3f4f6;font-size:12px}
input.tm-input:focus,textarea.tm-input:focus{outline:none;border-color:rgba(16,185,129,0.5);background:rgba(255,255,255,0.07)}
textarea.tm-input{font-family:'Cascadia Code','Consolas',monospace;resize:vertical}
.row{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.muted{color:#9ca3af}
.mono{font-family:'Cascadia Code','Consolas',monospace}
.green{color:#6ee7b7}
.red{color:#fca5a5}
.amber{color:#fcd34d}
.audit-row{padding:9px 10px;border:1px solid rgba(255,255,255,0.06);border-radius:6px;margin-bottom:6px;background:rgba(255,255,255,0.02)}
.audit-row:hover{background:rgba(255,255,255,0.04)}
.audit-head{display:flex;align-items:center;gap:8px;margin-bottom:4px}
.audit-title{flex:1;font-size:11px;color:#e5e7eb;font-weight:500}
.audit-detail{font-size:10px;color:#9ca3af;font-family:'Cascadia Code','Consolas',monospace;margin-top:3px;word-break:break-word}
.err-row{padding:6px 8px;border-radius:4px;margin-bottom:4px;font-size:10px;font-family:'Cascadia Code','Consolas',monospace;background:rgba(255,255,255,0.02);border-left:3px solid #6b7280;word-break:break-word}
.err-row.fatal{border-left-color:#ef4444;background:rgba(239,68,68,0.06)}
.err-row.warn{border-left-color:#f59e0b}
.err-row .sev{font-size:8px;font-weight:700;text-transform:uppercase;letter-spacing:.3px}
.err-row .msg{color:#d1d5db;margin-top:2px}
.err-row .meta{color:#6b7280;font-size:9px;margin-top:2px}


.np-area{width:100%;height:100%;background:#0f0f17;color:#e5e7eb;border:none;outline:none;padding:12px;font-family:'Cascadia Code','Consolas',monospace;font-size:12px;resize:none}
.np-toolbar{display:flex;gap:6px;padding:6px 8px;background:#181820;border-bottom:1px solid rgba(255,255,255,0.06);align-items:center}
.np-status{margin-left:auto;font-size:10px;color:#6b7280;font-family:monospace}


.app-runner{display:flex;flex-direction:column;height:100%}
.app-runner canvas{display:block;background:#0a0a12;image-rendering:pixelated}
.app-runner .ar-log{flex:1;overflow-y:auto;padding:8px;font-family:monospace;font-size:10px;color:#9ca3af;background:#0a0a12;border-top:1px solid rgba(255,255,255,0.06)}
.app-runner .ar-bar{display:flex;gap:6px;align-items:center;padding:4px 8px;background:#181820;font-size:10px;color:#9ca3af}


#ctx-menu{position:fixed;background:rgba(28,28,38,0.96);backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,0.1);border-radius:8px;padding:6px;z-index:150000;display:none;box-shadow:0 12px 40px rgba(0,0,0,0.5);min-width:180px}
#ctx-menu.open{display:block}
.ctx-item{padding:8px 12px;border-radius:4px;cursor:pointer;font-size:12px;color:#e5e7eb;display:flex;align-items:center;gap:8px}
.ctx-item:hover{background:rgba(255,255,255,0.08)}
.ctx-sep{height:1px;background:rgba(255,255,255,0.08);margin:4px 0}


.hidden{display:none!important}
.flex{display:flex}
.col{flex-direction:column}
.gap-2{gap:8px}.gap-3{gap:12px}.gap-4{gap:16px}
.items-center{align-items:center}
.justify-between{justify-content:space-between}
.text-center{text-align:center}
.mt-2{margin-top:8px}.mt-3{margin-top:12px}.mt-4{margin-top:16px}
.mb-2{margin-bottom:8px}.mb-3{margin-bottom:12px}
.w-full{width:100%}
.text-xs{font-size:10px}.text-sm{font-size:11px}

#home-screen{position:fixed;inset:0;z-index:99999;background:rgba(10,10,16,0.96);backdrop-filter:blur(32px);-webkit-backdrop-filter:blur(32px);display:none;flex-direction:column;padding:40px 20px 20px;overflow-y:auto}
#home-screen.open{display:flex;animation:homeOpen .2s ease-out}
@keyframes homeOpen{from{opacity:0;transform:scale(1.05)}to{opacity:1;transform:scale(1)}}
#home-search{width:100%;max-width:500px;margin:0 auto 30px;padding:12px 20px;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);border-radius:8px;color:#f3f4f6;font-size:14px;text-align:center}
#home-search:focus{outline:none;border-color:rgba(16,185,129,0.5);background:rgba(255,255,255,0.08)}
#home-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(110px,1fr));gap:16px;max-width:900px;margin:0 auto;width:100%}
.home-tile{display:flex;flex-direction:column;align-items:center;gap:8px;padding:20px 8px;border-radius:12px;cursor:pointer;transition:background .15s,transform .15s;text-align:center}
.home-tile:hover{background:rgba(255,255,255,0.06);transform:translateY(-3px)}
.home-tile:active{transform:scale(.95)}
.home-tile .ic{width:56px;height:56px;display:flex;align-items:center;justify-content:center;font-size:32px;background:rgba(16,185,129,0.08);border-radius:14px;border:1px solid rgba(16,185,129,0.15)}
.home-tile .nm{font-size:12px;color:#e5e7eb;max-width:100px;word-break:break-word;line-height:1.3}
#home-close{position:fixed;top:20px;right:30px;width:40px;height:40px;border-radius:50%;background:rgba(255,255,255,0.06);display:flex;align-items:center;justify-content:center;cursor:pointer;color:#9ca3af;font-size:20px;transition:background .15s}
#home-close:hover{background:rgba(255,255,255,0.12);color:#e5e7eb}
.tb-app[data-app="home"]{position:relative}
</style>

<body>


<div id="boot">
  <div class="boot-logo">Zephyr OS</div>
  <div class="boot-version">v7.1.0 — Zephyr Protocol API integration (SoA + view cache + double buffering) (writePixel batching + cached views)</div>
  <div class="boot-spinner"></div>
  <div class="boot-bar"><div class="boot-bar-fill" id="boot-bar-fill"></div></div>
  <div class="boot-tip" id="boot-tip">Initializing kernel partitions...</div>
</div>


<canvas id="wallpaper-canvas"></canvas>
<div id="wallpaper-overlay"></div>


<div id="desktop">
  <div id="icons"></div>
  <div id="windows"></div>
</div>


<div id="taskbar">
  <div class="taskbar-center">
    <div class="tb-app" data-app="home" title="Home (Win+H)"><span style="font-size:20px">⌂</span></div>
    <div class="tb-app" id="start-btn" title="Start (Win key)">
      <svg width="22" height="22" viewBox="0 0 24 24"><rect x="3" y="3" width="8" height="8" rx="1" fill="#10b981"/><rect x="13" y="3" width="8" height="8" rx="1" fill="#10b981"/><rect x="3" y="13" width="8" height="8" rx="1" fill="#10b981"/><rect x="13" y="13" width="8" height="8" rx="1" fill="#10b981"/></svg>
    </div>
    <div class="tb-app" data-app="taskmanager" title="Task Manager (Ctrl+Shift+Esc)"><span style="font-size:20px">📋</span></div>
    <div class="tb-app" data-app="terminal" title="Terminal"><span style="font-size:20px">▣</span></div>
    <div class="tb-app" data-app="fileexplorer" title="File Explorer"><span style="font-size:20px">📁</span></div>

    });

var HypervisorV2 = (function(){
  // =================================================================
  // STRUCT OF ARRAYS — zero JS objects per app instance (#10)
  // All app metadata stored in pre-allocated typed arrays.
  // Index i into each array = app slot.
  // =================================================================
  var MAX_APPS = 64;
  var appIds = new Int32Array(MAX_APPS);           // app ID (0 = free slot)
  appIds.fill(0);
  var appStates = new Uint8Array(MAX_APPS);         // 0=free, 1=running, 2=crashed, 3=closed
  var appTickCounts = new Float64Array(MAX_APPS);   // tick count
  var appHeartbeats = new Int32Array(MAX_APPS);     // heartbeat counter
  var appLastHeartbeats = new Int32Array(MAX_APPS); // watchdog comparison
  var appRafIds = new Int32Array(MAX_APPS);         // rAF handle (0 = none)
  var appStartTimes = new Float64Array(MAX_APPS);   // tick start time (for #18)

  // but we use fixed-length arrays, not dynamic objects.
  var appInstances = new Array(MAX_APPS);
  var appMemories = new Array(MAX_APPS);
  var appFramebuffers = new Array(MAX_APPS);  // ImageData objects
  var appCanvases = new Array(MAX_APPS);      // canvas elements
  var appStatusEls = new Array(MAX_APPS);     // status elements

  // MEMORY VIEW CACHE (#1) — invalidate on memory.grow()
  // Cached TypedArray views are invalidated when the underlying
  // ArrayBuffer changes (after memory.grow). We detect this by
  // comparing buffer references.
  // =================================================================
  var viewCache = new Array(MAX_APPS);
  function getCachedView(slot){
    var mem = appMemories[slot];
    if(!mem) return null;
    var cached = viewCache[slot];
    // Check if buffer changed (grow invalidates the old buffer)
    if(!cached || cached.buffer !== mem.buffer || cached.byteLength !== mem.buffer.byteLength){
      // Reallocate view against new buffer
      var viewLen = Math.min(mem.buffer.byteLength, 400 * 300 * 4);
      cached = new Uint8ClampedArray(mem.buffer, 0, viewLen);
      viewCache[slot] = cached;
    }
    return cached;
  }

  // DOUBLE BUFFERING (#4) — ping-pong framebuffers
  // Each app has two framebuffer regions in its WASM memory.
  // The app writes to the "write" buffer; Circle 2 reads the "read" buffer.
  // We swap pointers each frame.
  // =================================================================
  var DOUBLE_BUF_SIZE = 400 * 300 * 4; // 480KB per buffer
  var writeOffsets = new Int32Array(MAX_APPS);  // offset app writes to
  var readOffsets = new Int32Array(MAX_APPS);   // offset Circle 2 reads from

    // App needs 2 pages min for double buffering (2 * 480KB = 960KB ≈ 15 pages)
    // We use 16 pages (1MB) to be safe
    writeOffsets[slot] = 0;
    readOffsets[slot] = DOUBLE_BUF_SIZE;
  }

    var tmp = writeOffsets[slot];
    writeOffsets[slot] = readOffsets[slot];
    readOffsets[slot] = tmp;
  }

  // TIME-SLICE QUOTA (#18) — kill apps that exceed 16ms per tick
  // =================================================================
  var TICK_BUDGET_MS = 16;

    var elapsed = performance.now() - appStartTimes[slot];

      var statusEl = appStatusEls[slot];

        statusEl.style.color = '#ef4444';
      }
      if(appRafIds[slot]){ cancelAnimationFrame(appRafIds[slot]); appRafIds[slot] = 0; }
      return false;
    }
    return true;
  }

  // =================================================================
  // ALLOCATE / FREE SLOTS
  // =================================================================
  function allocSlot(){
    for(var i=0; i<MAX_APPS; i++){
      if(appStates[i] === 0 || appStates[i] === 3){
        appIds[i] = i + 1;
        appStates[i] = 1;
        appTickCounts[i] = 0;
        appHeartbeats[i] = 0;
        appLastHeartbeats[i] = 0;
        appRafIds[i] = 0;
        return i;
      }
    }
    return -1;
  }

  function freeSlot(slot){
    appStates[slot] = 3;
    appIds[slot] = 0;

    appMemories[slot] = null;
    appFramebuffers[slot] = null;
    appCanvases[slot] = null;

    var running = 0, crashed = 0, free = 0;

    getCachedView: getCachedView,
    initDoubleBuffer: initDoubleBuffer,
    swapBuffers: swapBuffers,

    writeOffsets: writeOffsets,

  });
})();

var CSPSafeExec = (function(){

  }

var WorkerPool = (function(){
  var pool = [];

      '    } else {',
      '      self.postMessage({type:"error", id:d.name, message:"NO_BLOB_URL"});',

      '    catch(err){ self.postMessage({type:"error", id:d.id, message: err.message}); }',
      '  }',

          thumb.innerHTML = '<div style="font-size:32px;opacity:0.6">'+(w.icon||'📄')+'</div>';
        }
      });
      card.appendChild(thumb);
      var label = document.createElement('div');
      label.style.cssText = 'display:flex;align-items:center;gap:6px;max-width:140px';
      label.innerHTML = '<span style="font-size:14px">'+(w.icon||'📄')+'</span><span style="font-size:11px;color:#e5e7eb;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+C2.string.escapeHtml(w.title||'Window')+'</span>';
      card.appendChild(label);
      switcherEl.appendChild(card);
    });
  }
  function captureThumbnail(w, cb){
    try{
      var content = w.content;
      if(!content){ cb(null); return; }
      var rect = content.getBoundingClientRect();
      var w_ = Math.min(rect.width || 400, 400);
      var h_ = Math.min(rect.height || 300, 300);
      var clone = content.cloneNode(true);
      var xml = new XMLSerializer().serializeToString(clone);
      var svg = '<svg xmlns="http://www.w3.org/2000/svg" width="'+w_+'" height="'+h_+'"><foreignObject width="100%" height="100%"><div xmlns="http://www.w3.org/1999/xhtml" style="width:'+w_+'px;height:'+h_+'px;background:#13131b">'+xml+'</div></foreignObject></svg>';
      var blob = new Blob([svg], {type:'image/svg+xml;charset=utf-8'});
      var url = URL.createObjectURL(blob);
      var img = new Image();
      var thumbDone = false;
      function finishThumb(data){ if(thumbDone) return; thumbDone = true; try{ URL.revokeObjectURL(url); }catch(e){} cb(data); }
      img.onload = function(){
        var canvas = document.createElement('canvas');
        canvas.width = 140; canvas.height = 90;
        var ctx = canvas.getContext('2d');
        ctx.fillStyle = '#0a0a0f'; ctx.fillRect(0,0,140,90);
        ctx.drawImage(img, 0, 0, 140, 90);
        finishThumb(canvas.toDataURL('image/png'));
      };
      img.onerror = function(){ finishThumb(null); };
      img.src = url;
      setTimeout(function(){ if(!img.complete || img.naturalWidth === 0){ finishThumb(null); } }, 800);
    }catch(e){ cb(null); }
  }
  function cycleSwitcher(){
    var wins = list().filter(function(w){ return !w.minimized; });
    if(wins.length === 0) return;
    switcherIdx = (switcherIdx + 1) % wins.length;
    renderSwitcher(wins);
  }
  function hideSwitcher(){
    if(!switcherEl) return;
    var wins = list().filter(function(w){ return !w.minimized; });
    if(wins[switcherIdx]) focus(wins[switcherIdx].id);
    switcherEl.style.display = 'none';
  }
  function isSwitcherVisible(){ return switcherEl && switcherEl.style.display === 'flex'; }

  return { create:create, close:close, minimize:minimize, restore:restore, toggleMax:toggleMax, focus:focus, list:list, get:get, getActiveId:getActiveId, showSwitcher:showSwitcher, cycleSwitcher:cycleSwitcher, hideSwitcher:hideSwitcher, isSwitcherVisible:isSwitcherVisible, captureThumbnail:captureThumbnail };
})();

        document.querySelectorAll('.desktop-icon').forEach(function(i){ i.classList.remove('selected'); });
      }
      el.classList.toggle('selected');
    });

    var lastTap = 0;
    el.addEventListener('touchend', function(e){
      var now = Date.now();
      if(now - lastTap < 350){ opts.onOpen(); e.preventDefault(); }

    });

      AUDIT_FIXES.forEach(function(fix, idx){
        chain = chain.then(function(){
          var fn = checks[fix.id];
          return new Promise(function(testResolve){
            var settled = false;
            var timer = setTimeout(function(){
              if(!settled){ settled = true; testResolve({pass:false, detail:'TEST TIMEOUT (10s)'}); }
            }, 10000);
            try{
              var r = fn(Kernel);
              if(r && r.then){
                r.then(function(res){ if(!settled){ settled = true; clearTimeout(timer); testResolve(res); } })
                  .catch(function(e){ if(!settled){ settled = true; clearTimeout(timer); testResolve({pass:false, detail:'threw: '+e.message}); } });
              } else {
                if(!settled){ settled = true; clearTimeout(timer); testResolve(r); }
              }
            }catch(e){
              if(!settled){ settled = true; clearTimeout(timer); testResolve({pass:false, detail:'threw: '+e.message}); }
            }
          });
        }).then(function(r){
          results.push({id:fix.id, title:fix.title, pass:r.pass, detail:r.detail});
          bar.style.width = ((idx+1)/AUDIT_FIXES.length*100) + '%';
          var passes = results.filter(function(x){return x.pass;}).length;
          document.getElementById('tm-test-summary').innerHTML = '<span class="'+(passes===results.length?'green':'red')+'" style="font-weight:600">'+passes+' pass · '+(results.length-passes)+' fail</span> · '+results.length+'/'+AUDIT_FIXES.length+' tests';
          var row = document.createElement('div');
          row.className = 'audit-row';
          row.innerHTML = '<div class="audit-head"><span class="badge '+(r.pass?'pass':'fail')+'">'+(r.pass?'PASS':'FAIL')+'</span><span class="audit-title">Test #'+fix.id+': '+C2.string.escapeHtml(fix.title.slice(0,60))+'</span></div><div class="audit-detail">'+C2.string.escapeHtml(r.detail)+'</div>';
          list.appendChild(row);
        });
      });
      chain.then(function(){
        try{
          var pm = Kernel.getPartitionRaw('C3.6');
          if(pm){
            var corePartitions = ['C3.1','C3.2','C3.3','C3.4','C3.5','C3.6','C3.7','C3.8','C3.9','C3.10','C3.11','C3.12','C3.13','C3.14','C3.15','C3.16','C3.17','C3.18','C3.19','C3.20','C3.21','C3.22','C3.23','C3.24','C3.25'];
            Kernel.listPartitions().forEach(function(pid){
              if(corePartitions.indexOf(pid) < 0){
                try{ pm.invoke('destroy', pid); }catch(e){}
              }
            });
          }
        }catch(e){}
        try{
          var errs = Kernel.getErrors();
          var hasNoise = false;
          for(var ei=0; ei<errs.length; ei++){
            var em = (errs[ei].msg||'') + '';
            var ep = errs[ei].partition || '';
            if(em.indexOf('IPC_MAILBOX_EVICT') >= 0 || em.indexOf('VFS_PERSIST_FAILED') >= 0 || em.indexOf('SCHED_TASK_ERR') >= 0 || em.indexOf('EVENT_DISPATCH_ERR') >= 0 || ep === 'TEST' || ep === 'T' || ep === 'RING_TEST'){
              hasNoise = true;
              break;
            }
          }
          Kernel.clearErrors();
        }catch(e){}
        btn.disabled = false; btn.textContent = '▶ Run all tests';
        setTimeout(function(){ try{ Kernel.clearErrors(); }catch(e){} }, 1000);
        var copyArea = document.getElementById('tm-copy-area');
        if(copyArea) copyArea.style.display = 'block';
        var copyBtn = document.getElementById('tm-copy-all');
        if(copyBtn){
          copyBtn.onclick = function(){
            var passes = results.filter(function(x){return x.pass;}).length;
            var fails = results.length - passes;
            var lines = [];
            lines.push('=== Zephyr OS Test Results ===');
            lines.push('Version: ' + Kernel.app.version);
            lines.push('Date: ' + new Date().toISOString());
            lines.push('Total: ' + results.length + ' | Pass: ' + passes + ' | Fail: ' + fails);
            lines.push('');
            results.forEach(function(r){
              var status = r.pass ? 'PASS' : 'FAIL';
              lines.push('[' + status + '] #' + r.id + ' ' + r.title);
              lines.push('  ' + r.detail);
            });
            lines.push('');
            lines.push('=== End of Results ===');
            var text = lines.join('\n');
            try{
              navigator.clipboard.writeText(text).then(function(){
                var s = document.getElementById('tm-copy-status');
                if(s) s.textContent = '✓ Copied ' + text.length + ' chars to clipboard';
                setTimeout(function(){ if(s) s.textContent = ''; }, 3000);
              }).catch(function(){
                var ta = document.createElement('textarea');
                ta.value = text;
                ta.style.position = 'fixed';
                ta.style.top = '-9999px';
                document.body.appendChild(ta);
                ta.select();
                try{ document.execCommand('copy'); var s = document.getElementById('tm-copy-status'); if(s) s.textContent = '✓ Copied ' + text.length + ' chars'; setTimeout(function(){ if(s) s.textContent=''; }, 3000); }catch(e2){}
                document.body.removeChild(ta);
              });
            }catch(e){
              var ta2 = document.createElement('textarea');
              ta2.value = text;
              ta2.style.position = 'fixed';
              ta2.style.top = '-9999px';
              document.body.appendChild(ta2);
              ta2.select();
              try{ document.execCommand('copy'); var s2 = document.getElementById('tm-copy-status'); if(s2) s2.textContent = '✓ Copied'; }catch(e3){}
              document.body.removeChild(ta2);
            }
          };
        }
      });
    };
  }

  function renderMemory(){
    var s = Kernel.memoryStats();
    var pct = (s.used / s.capacity * 100);
    var html = '<div class="tm-section"><h3>Memory Manager (C3.2)</h3>';
    html += '<div class="progress" style="height:12px"><div class="progress-bar" style="width:'+pct.toFixed(2)+'%"></div></div>';
    html += '<div class="mt-2 text-sm muted">'+s.used.toLocaleString()+' / '+s.capacity.toLocaleString()+' bytes ('+pct.toFixed(3)+'%)</div>';
    html += '<div class="mt-3"><table class="tm-table"><tbody>';
    html += '<tr><td class="muted">Bump pointer</td><td>'+s.bumpPointer.toLocaleString()+' bytes</td></tr>';
    html += '<tr><td class="muted">Freed (reclaimed)</td><td>'+s.freed.toLocaleString()+' bytes</td></tr>';
    html += '<tr><td class="muted">Allocated blocks</td><td>'+s.allocatedBlocks+'</td></tr>';
    html += '<tr><td class="muted">Free blocks (freelist)</td><td>'+s.freeBlocks+'</td></tr>';
    html += '<tr><td class="muted">Available</td><td class="green">'+s.available.toLocaleString()+' bytes</td></tr>';
    html += '</tbody></table></div></div>';
    html += '<div class="tm-section"><h3>Dev tools</h3><div class="row gap-2">';
    html += '<button class="btn sec" id="tm-alloc">Alloc 1KB block</button>';
    html += '<button class="btn sec" id="tm-alloc-bump">Alloc 1KB bump</button>';
    html += '<button class="btn sec" id="tm-grow">Grow WASM +1 page</button>';
    html += '<button class="btn danger" id="tm-clear-errs">Clear errors</button>';
    html += '</div><div id="tm-alloc-log" class="mt-2 mono text-xs muted"></div></div>';
    bodyEl.innerHTML = html;
    var log = [];
    var allocLog = document.getElementById('tm-alloc-log');
    function pushLog(msg){ log.unshift(msg); allocLog.innerHTML = log.slice(0,8).join('<br>'); }
    document.getElementById('tm-alloc').onclick = function(){
      try{ var h = Kernel.syscall.invoke('C3.2', 'allocBlock', 1024); pushLog('✓ allocBlock(1024) → {offset:'+h.offset+', kind:'+h.kind+', size:'+h.size+'}'); }
      catch(e){ pushLog('✗ '+e.message); }
      setTimeout(renderMemory, 50);
    };
    document.getElementById('tm-alloc-bump').onclick = function(){
      try{ var h = Kernel.syscall.invoke('C3.2', 'alloc', 1024); pushLog('✓ alloc(1024) → {offset:'+h.offset+', kind:'+h.kind+', size:'+h.size+'}'); pushLog('  (freeBlock on this throws ALLOC_KIND_MISMATCH — fix #3)'); }
      catch(e){ pushLog('✗ '+e.message); }
      setTimeout(renderMemory, 50);
    };
    document.getElementById('tm-grow').onclick = function(){
      var r = Kernel.syscall.invoke('C3.2', 'growMemory', 1);
      pushLog(r > 0 ? '✓ growMemory(1) → '+r+' bytes' : '✗ growMemory failed (no WASM memory attached)');
      setTimeout(renderMemory, 50);
    };
    document.getElementById('tm-clear-errs').onclick = function(){ Kernel.clearErrors(); pushLog('✓ errors cleared'); };
  }

  function renderErrors(){
    var fatals = Kernel.getFatalErrors();
    var recent = Kernel.getErrors().reverse();
    var html = '<div class="tm-section"><div class="row" style="justify-content:space-between"><h3 style="margin:0">Error Log</h3><div class="row gap-2"><button class="btn" id="tm-copy-errors">\uD83D\uDCCB Copy All Errors</button><button class="btn sec" id="tm-clear-errors2">Clear</button></div></div></div>';
    html += '<div class="tm-section"><div class="row gap-2"><span class="badge fail">FATAL</span><span class="muted text-sm">'+fatals.length+' entries (never evicted — fix #18)</span></div>';
    if(fatals.length === 0) html += '<p class="muted mt-2">No fatal errors.</p>';
    else { html += '<div class="mt-2" style="max-height:150px;overflow-y:auto">'; fatals.forEach(function(e){ html += errRowHtml(e, true); }); html += '</div>'; }
    html += '</div>';
    html += '<div class="tm-section"><div class="row gap-2"><span class="badge medium">RECENT</span><span class="muted text-sm">ring (128, most-recent first) — '+recent.length+' entries</span></div>';
    if(recent.length === 0) html += '<p class="muted mt-2">No errors.</p>';
    else { html += '<div class="mt-2" style="max-height:300px;overflow-y:auto">'; recent.forEach(function(e){ html += errRowHtml(e, e.severity==='FATAL'); }); html += '</div>'; }
    html += '</div>';
    bodyEl.innerHTML = html;
    document.getElementById('tm-clear-errors2').onclick = function(){ Kernel.clearErrors(); renderErrors(); };
    document.getElementById('tm-copy-errors').onclick = function(){
      var lines = [];
      lines.push('=== Zephyr OS Error Report ===');
      lines.push('Generated: ' + new Date().toISOString());
      lines.push('Version: ' + Kernel.c1.version);
      lines.push('Kernel state: ' + Kernel.getState());
      lines.push('Partitions: ' + Kernel.listPartitions().length);
      lines.push('Total errors: ' + Kernel.getErrorCount() + ' (' + fatals.length + ' fatal)');
      lines.push('');
      lines.push('=== FATAL ERRORS (' + fatals.length + ', never evicted) ===');
      if(fatals.length === 0){ lines.push('(none)'); }
      else {
        fatals.forEach(function(e, i){
          lines.push('[' + (i+1) + '] ' + e.severity + ' [' + e.partition + '] ' + new Date(e.time).toISOString());
          lines.push('    ' + e.msg);
          if(e.url) lines.push('    at ' + e.url + ':' + (e.line||0) + ':' + (e.col||0));
          if(e.stack) lines.push('    Stack: ' + e.stack.split('\n').join('\n    '));
          lines.push('');
        });
      }
      lines.push('=== RECENT ERRORS (ring buffer, ' + recent.length + ' entries) ===');
      if(recent.length === 0){ lines.push('(none)'); }
      else {
        recent.forEach(function(e, i){
          lines.push('[' + (i+1) + '] ' + e.severity + ' [' + e.partition + '] ' + new Date(e.time).toISOString());
          lines.push('    ' + e.msg);
          if(e.url) lines.push('    at ' + e.url + ':' + (e.line||0) + ':' + (e.col||0));
          lines.push('');
        });
      }
      lines.push('=== Boot Report ===');
      var br = Kernel.getBootReport();
      if(br){
        lines.push('Boot time (wall): ' + br.bootTime.toFixed(2) + ' ms');
        lines.push('Partition construction: ' + br.partitionConstructionTime.toFixed(2) + ' ms');
        lines.push('Locks: ' + br.locks.length + ' entries');
        br.locks.forEach(function(l){ lines.push('  ' + l.partition + ': ' + l.reason + ' (exports=' + l.exportCount + ')'); });
      }
      lines.push('');
      lines.push('=== End of Report ===');
      var text = lines.join('\n');
      if(navigator.clipboard && navigator.clipboard.writeText){
        navigator.clipboard.writeText(text).then(function(){
          Toast.success('Copied ' + (fatals.length + recent.length) + ' errors to clipboard', 2500);
        }).catch(function(){
          fallbackCopy(text);
        });
      } else {
        fallbackCopy(text);
      }
    };
    function fallbackCopy(text){
      var ta = document.createElement('textarea');
      ta.value = text;
      ta.style.cssText = 'position:fixed;left:-9999px;top:0';
      document.body.appendChild(ta);
      ta.select();
      try{ document.execCommand('copy'); Toast.success('Copied ' + (fatals.length + recent.length) + ' errors to clipboard', 2500); }
      catch(e){ Toast.error('Copy failed: ' + e.message, 3000); }
      ta.remove();
    }
  }
  function errRowHtml(e, isFatal){
    var cls = 'err-row' + (isFatal ? ' fatal' : (e.severity === 'WARN' ? ' warn' : ''));
    return '<div class="'+cls+'"><span class="sev">'+e.severity+'</span> <span class="muted">['+e.partition+']</span><div class="msg">'+C2.string.escapeHtml(e.msg)+'</div><div class="meta">'+new Date(e.time).toISOString()+(e.url?' · '+e.url+':'+(e.line||0):'')+'</div></div>';
  }

  function renderCreate(){
    var html = '<div class="tm-section"><h3>Create New App</h3>';
    html += '<p class="muted text-sm mb-2">Register an app with the kernel (C3.12.Workspace). It appears on the desktop and Start menu. If you provide JS code, it runs in a sandboxed iframe (fix #9) with clipped pixel writes (fix #10) and a per-app input queue (fix #11).</p>';
    html += '<div class="mb-2"><label class="text-sm muted">App name</label><input class="tm-input mt-2" id="tm-app-name" placeholder="e.g. Paint"></div>';

    html += '<div class="row gap-2"><button class="btn" id="tm-register">Register app</button><button class="btn sec" id="tm-register-launch">Register & launch</button></div>';
    html += '<div id="tm-create-log" class="mt-3 mono text-xs muted"></div></div>';
    html += '<div class="tm-section"><h3>Registered apps</h3><div id="tm-apps-list"></div></div>';
    bodyEl.innerHTML = html;
    function refreshAppsList(){
      var apps = Kernel.syscall.invoke('C3.12', 'listApps');
      var el = document.getElementById('tm-apps-list');
      if(apps.length === 0){ el.innerHTML = '<p class="muted">No apps registered.</p>'; return; }
      el.innerHTML = apps.map(function(n){ return '<div class="kv"><span class="k mono">🚀 '+C2.string.escapeHtml(n)+'</span><span><button class="btn sec" data-launch="'+C2.string.escapeHtml(n)+'">Launch</button> <button class="btn danger" data-del="'+C2.string.escapeHtml(n)+'">Delete</button></span></div>'; }).join('');
      el.querySelectorAll('[data-launch]').forEach(function(b){ b.onclick = function(){ Apps.launchCustom(b.getAttribute('data-launch')); }; });
      el.querySelectorAll('[data-del]').forEach(function(b){ b.onclick = function(){ Kernel.syscall.invoke('C3.12', 'unregisterApp', b.getAttribute('data-del')); try{ Kernel.saveApps(); }catch(e){} Desktop.rebuild(); StartMenu.rebuild(); refreshAppsList(); }; });
    }
    refreshAppsList();
    var logEl = document.getElementById('tm-create-log');
    function log(msg){ logEl.innerHTML = msg; }
    function doRegister(launch){
      var name = document.getElementById('tm-app-name').value.trim();
      var code = document.getElementById('tm-app-code').value.trim();
      if(!name){ log('<span class="red">Enter an app name.</span>'); return; }
      try{
        Kernel.syscall.invoke('C3.12', 'registerApp', name, code || null);
        try{ Kernel.saveApps(); }catch(e){}
        log('<span class="green">✓ Registered "'+C2.string.escapeHtml(name)+'" — added to desktop & Start menu</span>');
        Desktop.rebuild(); StartMenu.rebuild(); refreshAppsList();
        if(launch) Apps.launchCustom(name);
      }catch(e){ log('<span class="red">✗ '+C2.string.escapeHtml(e.message)+'</span>'); }
    }
    document.getElementById('tm-register').onclick = function(){ doRegister(false); };
    document.getElementById('tm-register-launch').onclick = function(){ doRegister(true); };
  }

  var _tmInterval = setInterval(function(){
    if(!WM.get('taskmanager')) return;
    var active = bodyEl.querySelector('.tm-tab.active');
    if(!active) return;
    var tabText = active.textContent;
    if(tabText.indexOf('Partitions') >= 0) renderPartitions();
    else if(tabText.indexOf('Memory') >= 0) renderMemory();
    else if(tabText.indexOf('Profiler') >= 0){
      var live = document.getElementById('tm-prof-live');
      if(live){
        var fps = Kernel.dispatch.call('LOOP_FPS').toFixed(1);
        var dt = Kernel.dispatch.call('LOOP_DT').toFixed(2);
        var q = Kernel.syscall.invoke('C3.5', 'queueLength');
        var s = Kernel.memoryStats();
        live.innerHTML = '<div class="kv"><span class="k">FPS</span><span class="v">'+fps+'</span></div><div class="kv"><span class="k">Delta</span><span class="v">'+dt+' ms</span></div><div class="kv"><span class="k">Event queue</span><span class="v">'+q+'</span></div><div class="kv"><span class="k">Mem used</span><span class="v">'+s.used.toLocaleString()+'</span></div>';
      }
    }
  }, 1000);

  WM.create({
    id: id,
    title: 'Task Manager',
    icon: '📋',
    width: 640,
    height: 520,
    content: content,
    onClose: function(){ try{ clearInterval(_tmInterval); }catch(e){} }
  });

  renderTab(initialTab || 'partitions');
};
