var SystemMonitor = (function(){
  var widget = null;
  var canvas = null, ctx = null;
  var timer = null;
  var history = { fps: [], mem: [], errs: [], dt: [] };
  var MAX_HIST = 60;
  var pinned = false;

  function build(){
    widget = document.createElement('div');
    widget.id = 'sysmon-widget';
    widget.style.cssText = 'position:fixed;top:60px;right:12px;width:200px;background:rgba(12,12,20,0.92);backdrop-filter:blur(20px);border:1px solid rgba(16,185,129,0.25);border-radius:8px;padding:10px;z-index:99990;box-shadow:0 8px 30px rgba(0,0,0,0.5);font-family:monospace;font-size:10px';
    widget.innerHTML =
      '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">'+
        '<span style="color:#6ee7b7;font-weight:600;font-size:11px">📊 System Monitor</span>'+
        '<div style="display:flex;gap:4px">'+
          '<span id="sm-pin" style="cursor:pointer;color:#6b7280;font-size:12px;line-height:1;padding:2px" title="Pin (keep on top)">📌</span>'+
          '<span id="sm-close" style="cursor:pointer;color:#6b7280;font-size:14px;line-height:1">×</span>'+
        '</div>'+
      '</div>'+
      '<canvas id="sm-canvas" width="180" height="120" style="display:block;width:100%;height:120px"></canvas>'+
      '<div style="display:grid;grid-template-columns:1fr 1fr;gap:2px;margin-top:6px;font-size:9px">'+
        '<div style="color:#6b7280">FPS: <span id="sm-fps" style="color:#6ee7b7">--</span></div>'+
        '<div style="color:#6b7280">Δt: <span id="sm-dt" style="color:#22d3ee">--</span></div>'+
        '<div style="color:#6b7280">Mem: <span id="sm-mem" style="color:#fcd34d">--</span></div>'+
        '<div style="color:#6b7280">Errs: <span id="sm-errs" style="color:#fca5a5">--</span></div>'+
        '<div style="color:#6b7280">Parts: <span id="sm-parts" style="color:#a78bfa">--</span></div>'+
        '<div style="color:#6b7280">Pinned: <span id="sm-pinned" style="color:#9ca3af">no</span></div>'+
      '</div>';
    document.body.appendChild(widget);
    canvas = document.getElementById('sm-canvas');
    ctx = canvas.getContext('2d');
    document.getElementById('sm-close').onclick = hide;
    document.getElementById('sm-pin').onclick = function(){
      pinned = !pinned;
      document.getElementById('sm-pin').style.color = pinned ? '#6ee7b7' : '#6b7280';
      document.getElementById('sm-pinned').textContent = pinned ? 'yes' : 'no';
      widget.style.zIndex = pinned ? 100010 : 99990;
    };
    var header = widget.firstElementChild;
    var dragOff = null;
    header.style.cursor = 'move';
    header.addEventListener('mousedown', function(e){
      dragOff = {x: e.clientX - widget.offsetLeft, y: e.clientY - widget.offsetTop};
      e.preventDefault();
    });
    document.addEventListener('mousemove', function(e){
      if(!dragOff) return;
      widget.style.left = (e.clientX - dragOff.x) + 'px';
      widget.style.top = (e.clientY - dragOff.y) + 'px';
      widget.style.right = 'auto';
    });
    document.addEventListener('mouseup', function(){ dragOff = null; });
  }

  function draw(){
    if(!widget || !ctx) return;
    var w = canvas.width, h = canvas.height;
    ctx.fillStyle = '#0a0a0f';
    ctx.fillRect(0, 0, w, h);
    ctx.strokeStyle = 'rgba(255,255,255,0.05)';
    ctx.lineWidth = 1;
    for(var i=0; i<4; i++){
      var y = (h/4)*i;
      ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(w, y); ctx.stroke();
    }
    function drawLine(arr, max, color){
      if(arr.length < 2) return;
      ctx.strokeStyle = color;
      ctx.lineWidth = 1.5;
      ctx.beginPath();
      for(var i=0; i<arr.length; i++){
        var x = (i / (MAX_HIST-1)) * w;
        var v = Math.min(arr[i] / max, 1);
        var y = h - v * h;
        if(i === 0) ctx.moveTo(x, y);
        else ctx.lineTo(x, y);
      }
      ctx.stroke();
    }
    drawLine(history.fps, 70, '#10b981');
    drawLine(history.dt, 50, '#22d3ee');
    drawLine(history.mem, 1024, '#f59e0b');
    drawLine(history.errs, 20, '#ef4444');
    ctx.fillStyle = '#10b981'; ctx.fillRect(2, 2, 8, 2);
    ctx.fillStyle = '#6b7280'; ctx.fillText('fps', 12, 5);
    ctx.fillStyle = '#22d3ee'; ctx.fillRect(34, 2, 8, 2);
    ctx.fillStyle = '#6b7280'; ctx.fillText('dt', 44, 5);
    ctx.fillStyle = '#f59e0b'; ctx.fillRect(62, 2, 8, 2);
    ctx.fillStyle = '#6b7280'; ctx.fillText('mem', 72, 5);
    ctx.fillStyle = '#ef4444'; ctx.fillRect(100, 2, 8, 2);
    ctx.fillStyle = '#6b7280'; ctx.fillText('err', 110, 5);
  }

  function tick(){
    if(!widget) return;
    var fps = Kernel.getState() === 'RUNNING' ? Kernel.dispatch.call('LOOP_FPS') : 0;
    var dt = Kernel.getState() === 'RUNNING' ? Kernel.dispatch.call('LOOP_DT') : 0;
    var s = Kernel.memoryStats();
    var errs = Kernel.getErrorCount();
    var parts = Kernel.listPartitions().length;
    history.fps.push(fps);
    history.dt.push(dt);
    history.mem.push(s.used);
    history.errs.push(errs);
    if(history.fps.length > MAX_HIST) history.fps.shift();
    if(history.dt.length > MAX_HIST) history.dt.shift();
    if(history.mem.length > MAX_HIST) history.mem.shift();
    if(history.errs.length > MAX_HIST) history.errs.shift();
    document.getElementById('sm-fps').textContent = Math.round(fps);
    document.getElementById('sm-dt').textContent = dt.toFixed(1) + 'ms';
    document.getElementById('sm-mem').textContent = s.used < 1024 ? s.used + 'B' : (s.used/1024).toFixed(1) + 'K';
    document.getElementById('sm-errs').textContent = errs;
    document.getElementById('sm-parts').textContent = parts;
    draw();
  }

  function show(){
    if(!widget) build();
    widget.style.display = 'block';
    if(timer) clearInterval(timer);
    timer = setInterval(tick, 500);
    tick();
  }
  function hide(){
    if(widget) widget.style.display = 'none';
    if(timer){ clearInterval(timer); timer = null; }
  }
  function toggle(){
    if(widget && widget.style.display === 'block') hide();
    else show();
  }
  function isOpen(){ return widget && widget.style.display === 'block'; }
  return { show:show, hide:hide, toggle:toggle, isOpen:isOpen };
})();


var HomeScreen = (function(){
  var overlay = null;
  var grid = null;
  var search = null;

  function build(){
    overlay = document.createElement('div');
    overlay.id = 'home-screen';
    var closeBtn = document.createElement('div');
    closeBtn.id = 'home-close';
    closeBtn.innerHTML = '&times;';
    closeBtn.addEventListener('click', close);
    overlay.appendChild(closeBtn);
    var searchInput = document.createElement('input');
    searchInput.id = 'home-search';
    searchInput.type = 'text';
    searchInput.placeholder = 'Search apps...';
    searchInput.addEventListener('input', function(){ filter(searchInput.value); });
    overlay.appendChild(searchInput);
    grid = document.createElement('div');
    grid.id = 'home-grid';
    overlay.appendChild(grid);
    document.body.appendChild(overlay);
    overlay.addEventListener('click', function(e){ if(e.target === overlay) close(); });
    search = searchInput;
  }

  function getApps(){
    var apps = [
      {name:'Task Manager', icon:'\uD83D\uDCCB', onOpen:function(){ Apps.taskManager(); }},
      {name:'Terminal', icon:'\u25A3', onOpen:function(){ Apps.terminal(); }},
      {name:'File Explorer', icon:'\uD83D\uDCC1', onOpen:function(){ Apps.fileExplorer(); }},
      {name:'App Store', icon:'\uD83D\uDECD\uFE0F', onOpen:function(){ Apps.appStore(); }},
      {name:'Settings', icon:'\u2699\uFE0F', onOpen:function(){ Apps.settings(); }},
      {name:'Notepad', icon:'\uD83D\uDCDD', onOpen:function(){ Apps.notepad(); }},
      {name:'Calculator', icon:'\uD83E\uDDEE', onOpen:function(){ Apps.calculator(); }},
      {name:'About Zephyr', icon:'\u2139\uFE0F', onOpen:function(){ Apps.about(); }}
    ];
    try{
      Kernel.syscall.invoke('C3.12', 'listApps').forEach(function(n){
        if(n.indexOf('__') === 0) return;
        apps.push({name:n, icon:'\uD83D\uDE80', onOpen:function(){ Apps.launchCustom(n); }});
      });
    }catch(e){}
    return apps;
  }

  function rebuild(){
    if(!overlay) build();
    grid.innerHTML = '';
    var apps = getApps();
    apps.forEach(function(a){
      var tile = document.createElement('div');
      tile.className = 'home-tile';
      tile.innerHTML = '<div class="ic">'+a.icon+'</div><div class="nm">'+C2.string.escapeHtml(a.name)+'</div>';
      tile.addEventListener('click', function(){ close(); a.onOpen(); });
      grid.appendChild(tile);
    });
  }

  function filter(query){
    query = (query || '').toLowerCase();
    var tiles = grid.querySelectorAll('.home-tile');
    tiles.forEach(function(t){
      var name = t.querySelector('.nm').textContent.toLowerCase();
      t.style.display = name.indexOf(query) >= 0 ? '' : 'none';
    });
  }

  function open(){ rebuild(); overlay.classList.add('open'); search.value = ''; setTimeout(function(){ search.focus(); }, 50); }
  function close(){ if(overlay) overlay.classList.remove('open'); }
  function toggle(){ if(overlay && overlay.classList.contains('open')) close(); else open(); }
  function isOpen(){ return !!(overlay && overlay.classList.contains('open')); }

  return { open:open, close:close, toggle:toggle, isOpen:isOpen, rebuild:rebuild };
})();

var Toast = (function(){
  var container = null;
  function ensureContainer(){
    if(container) return container;
    container = document.createElement('div');
    container.id = 'toast-container';
    container.style.cssText = 'position:fixed;bottom:56px;right:12px;z-index:100050;display:flex;flex-direction:column;gap:8px;pointer-events:none;max-width:300px';
    document.body.appendChild(container);
    return container;
  }
  function show(message, type, duration){
    var c = ensureContainer();
    type = type || 'info';
    duration = duration || 3000;
    var colors = {
      info: {bg:'rgba(16,185,129,0.15)', border:'rgba(16,185,129,0.4)', icon:'ℹ️', text:'#6ee7b7'},
      success: {bg:'rgba(16,185,129,0.15)', border:'rgba(16,185,129,0.4)', icon:'✓', text:'#6ee7b7'},
      warn: {bg:'rgba(245,158,11,0.15)', border:'rgba(245,158,11,0.4)', icon:'⚠', text:'#fcd34d'},
      error: {bg:'rgba(239,68,68,0.15)', border:'rgba(239,68,68,0.4)', icon:'✗', text:'#fca5a5'}
    };
    var col = colors[type] || colors.info;
    var toast = document.createElement('div');
    toast.style.cssText = 'background:'+col.bg+';border:1px solid '+col.border+';border-radius:8px;padding:10px 14px;display:flex;align-items:center;gap:8px;font-size:12px;color:'+col.text+';box-shadow:0 8px 30px rgba(0,0,0,0.4);backdrop-filter:blur(20px);pointer-events:auto;animation:toastIn .2s ease-out;max-width:280px';
    toast.innerHTML = '<span style="font-size:14px">'+col.icon+'</span><span>'+C2.string.escapeHtml(message)+'</span>';
    c.appendChild(toast);
    setTimeout(function(){
      toast.style.transition = 'opacity .3s,transform .3s';
      toast.style.opacity = '0';
      toast.style.transform = 'translateX(20px)';
      setTimeout(function(){ toast.remove(); }, 300);
    }, duration);
  }
  return { show:show, info:function(m,d){show(m,'info',d)}, success:function(m,d){show(m,'success',d)}, warn:function(m,d){show(m,'warn',d)}, error:function(m,d){show(m,'error',d)} };
})();


document.addEventListener('keydown', function(e){
  if(e.ctrlKey && e.shiftKey && e.key === 'Escape'){ e.preventDefault(); Apps.taskManager(); return; }
  if(e.ctrlKey && e.shiftKey && (e.key === 'M' || e.key === 'm')){ e.preventDefault(); SystemMonitor.toggle(); return; }
  if(e.key === 'Meta' || (e.key === 'OS')){ e.preventDefault(); StartMenu.toggle(); return; }
  if(e.key === 'Home' || (e.ctrlKey && e.key === 'h')){ e.preventDefault(); HomeScreen.toggle(); return; }
  if(e.altKey && e.key === 'Tab'){
    e.preventDefault();
    if(!WM.isSwitcherVisible()) WM.showSwitcher();
    else WM.cycleSwitcher();
    return;
  }
  if(e.key === 'Alt' && WM.isSwitcherVisible()){ WM.hideSwitcher(); return; }
  if(e.key === 'Escape'){
    if(WM.isSwitcherVisible()){ WM.hideSwitcher(); return; }
    StartMenu.close();
    ContextMenu.close();
    QuickSettings.close();
    return;
  }
});


window.addEventListener('resize', function(){
  var c = document.getElementById('wallpaper-canvas');
  var dpr = window.devicePixelRatio || 1;
  c.width = window.innerWidth * dpr;
  c.height = window.innerHeight * dpr;
  c.style.width = window.innerWidth + 'px';
  c.style.height = window.innerHeight + 'px';
  var ds = Kernel.getPartitionRaw('C3.15');
  if(ds && !ds.isDestroyed){
    try{
      if(ds.invoke('isBound')){
        ds.invoke('rebind', c.width, c.height);
      }
    }catch(e){}
  }
});


function boot(){
  document.querySelectorAll('.tb-app[data-app]').forEach(function(btn){
    btn.addEventListener('click', function(){
      var app = btn.getAttribute('data-app');
      if(app === 'home') HomeScreen.toggle();
      else if(app === 'taskmanager') Apps.taskManager();
      else if(app === 'terminal') Apps.terminal();
      else if(app === 'fileexplorer') Apps.fileExplorer();
      else if(app === 'appstore') Apps.appStore();
      else if(app === 'settings') Apps.settings();
      else if(app === 'notepad') Apps.notepad();
      else if(app === 'calculator') Apps.calculator();
      else if(app === 'about') Apps.about();
    });
  });
  var fill = document.getElementById('boot-bar-fill');
  var tip = document.getElementById('boot-tip');
  var tips = ['Initializing kernel partitions...','Sealing Circle 1 boot record...','Deep-freezing Circle 2 utils...','Building 25 C3 partitions...','Freezing dispatch table...','Locking partition exports...','Starting render loop...','Mounting desktop...'];
  var tipIdx = 0;
  var pct = 0;
  var bootInterval = setInterval(function(){
    pct = Math.min(100, pct + Math.random() * 18);
    fill.style.width = pct + '%';
    if(tip){
      var tipText = tipIdx < tips.length ? tips[tipIdx] : 'Ready';
      tip.textContent = tipText + ' (' + Math.round(pct) + '%)';
      if(tipIdx < tips.length) tipIdx++;
    }
    if(pct >= 100){
      clearInterval(bootInterval);
      Kernel.boot();
      Desktop.rebuild();
      StartMenu.rebuild();
      setTimeout(function(){
        document.getElementById('boot').classList.add('hidden');
        setTimeout(function(){ document.getElementById('boot').style.display = 'none'; }, 600);
      }, 200);
    }
  }, 120);
}

window.Apps = Apps;
window.WM = WM;
window.HomeScreen = HomeScreen;

if(document.readyState === 'loading') document.addEventListener('DOMContentLoaded', boot);
else boot();

})();
